<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basic Rhythm</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;font-size:12px;background:#f5f4f0;color:#1a1a18;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:1.5rem}

.frame{border:1px solid #d0cec7;border-radius:12px;padding:.85rem 1rem;background:#fff;width:100%;max-width:780px}
.app-title{font-size:15px;font-weight:500;letter-spacing:.04em;margin-bottom:.65rem;color:#1a1a18}

.transport{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:.55rem}
.t-left{display:flex;align-items:center}
.t-center{display:flex;align-items:center;gap:6px;white-space:nowrap}
.t-right{display:flex;align-items:center;justify-content:flex-end;gap:6px}

.btn{padding:4px 12px;cursor:pointer;font-size:12px;font-weight:500;background:#fff;border:1px solid #b0aea7;border-radius:6px;color:#1a1a18}
.btn:hover{background:#f0ede8}
.btn.active{background:#ddeeff;border-color:#5599cc;color:#1155aa}
.btn-tog{padding:3px 7px;cursor:pointer;font-size:11px;background:#fff;border:1px solid #b0aea7;border-radius:6px;color:#666}
.btn-tog:hover{background:#f0ede8}
.btn-tog.on{background:#ddeeff;border-color:#5599cc;color:#1155aa}

.t-group{display:flex;align-items:center;gap:5px;font-size:11px;color:#666}
.t-group input[type=range]{width:75px;accent-color:#666}
.t-group .val{font-weight:500;color:#1a1a18;min-width:28px}

.hdivider{height:1px;background:#e0ddd8;margin-bottom:.55rem}

.layer-row{display:grid;grid-template-columns:130px 1px 1fr 1px 112px;gap:0;align-items:stretch;margin-bottom:3px;min-height:48px}
.vbar{background:#d0cec7;width:1px;align-self:stretch}

.col-l{display:flex;flex-direction:column;gap:2px;padding-right:6px;justify-content:center}
.sel-row{display:flex;align-items:center;gap:2px}
.sel-row select{font-size:9px;flex:1;padding:1px 2px;border:1px solid #ccc;border-radius:4px;background:#fff;color:#1a1a18}
.ico-save{cursor:pointer;font-size:11px;background:none;border:none;padding:0 1px;line-height:1;opacity:.6;flex-shrink:0}
.ico-save:hover{opacity:1}
.ctrl-row{display:flex;align-items:center;gap:2px}
.ico{padding:1px 3px;cursor:pointer;font-size:10px;background:none;border:1px solid #d0cec7;border-radius:2px;color:#666;line-height:1.3;display:inline-flex;align-items:center}
.ico:hover{background:#f0ede8}
.confirm-row{display:flex;align-items:center;gap:2px;font-size:9px;color:#666}
.confirm-row span{flex:1}

.col-c{display:flex;align-items:center;padding:0 5px;gap:4px}
.steps{display:flex;gap:2px;flex-wrap:nowrap;align-items:center;flex:1}
.step{width:18px;height:18px;border-radius:3px;border:1px solid #d0cec7;background:#f0ede8;flex-shrink:0;cursor:pointer;transition:background .05s}
.step:hover{border-color:#aaa}
.step.on.low  {background:#378ADD33;border-color:#378ADD99}
.step.on.high {background:#D85A3033;border-color:#D85A3099}
.step.on.noise{background:#1D9E7533;border-color:#1D9E7599}
.step.on.low.cur  {background:#378ADD;border-color:#185FA5}
.step.on.high.cur {background:#D85A30;border-color:#993C1D}
.step.on.noise.cur{background:#1D9E75;border-color:#0F6E56}
.step.off.cur{background:#ddd;border-color:#aaa}

.shift-ctrl{display:flex;align-items:center;gap:1px;flex-shrink:0}
.shift-btn{padding:1px 4px;cursor:pointer;font-size:11px;background:none;border:1px solid #d0cec7;border-radius:2px;color:#666;line-height:1.3}
.shift-btn:hover{background:#f0ede8}
.shift-num{min-width:13px;text-align:center;font-size:10px;color:#666}

.col-r{display:flex;flex-direction:column;gap:3px;padding-left:7px;justify-content:center}
.snd-name{font-size:11px;font-weight:500;text-align:center;color:#1a1a18}
.sl-row{display:flex;align-items:center;gap:3px}
.sl-row label{font-size:9px;color:#888;width:28px;flex-shrink:0}
.sl-row input[type=range]{flex:1;padding:0;accent-color:#888}
.sl-row .sv{font-size:9px;color:#666;min-width:28px;text-align:right}

.layer-sep{height:1px;background:#e8e6e2;margin:3px 0}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border:1px solid #c0bdb7;border-radius:12px;padding:1rem 1.25rem;min-width:210px;box-shadow:0 4px 24px rgba(0,0,0,.12)}
.modal h3{font-size:13px;font-weight:500;margin-bottom:.75rem}
.modal input[type=text]{width:100%;font-size:12px;padding:4px 7px;border:1px solid #c0bdb7;border-radius:6px;background:#f5f4f0;color:#1a1a18;margin-bottom:.75rem}
.modal input[type=text]:focus{outline:none;border-color:#5599cc}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}

@media(max-width:600px){
  .layer-row{grid-template-columns:100px 1px 1fr 1px 95px}
  .transport{grid-template-columns:1fr}
  .t-right,.t-left{display:none}
  .t-center{justify-content:center;flex-wrap:wrap}
}
</style>
</head>
<body>

<div class="frame">
  <div class="app-title">Basic Rhythm</div>
  <div class="transport">
    <div class="t-left"></div>
    <div class="t-center">
      <button class="btn" id="btn-play">Play</button>
      <div class="t-group">
        <span>BPM</span>
        <input type="range" id="bpm" min="60" max="180" value="100" step="1">
        <span class="val" id="bpm-val">100</span>
      </div>
      <button class="btn-tog" id="btn-half">/2</button>
      <button class="btn-tog" id="btn-double">×2</button>
    </div>
    <div class="t-right">
      <div class="t-group">
        <span>Latence</span>
        <input type="range" id="latency" min="-200" max="200" value="0" step="5">
        <span class="val" id="lat-val">0ms</span>
      </div>
    </div>
  </div>
  <div class="hdivider"></div>
  <div id="layers"></div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3>Nom du rythme</h3>
    <input type="text" id="modal-input" placeholder="Mon rythme...">
    <div class="modal-btns">
      <button class="btn" id="modal-cancel">Annuler</button>
      <button class="btn active" id="modal-ok">OK</button>
    </div>
  </div>
</div>

<script>
const BASE=[
  {id:"pulse1", name:"Pulse (1)",      length:1,  pattern:"X",                custom:false},
  {id:"pulse2", name:"Pulse (2)",      length:2,  pattern:"X.",               custom:false},
  {id:"fl3",    name:"3 on the floor", length:3,  pattern:"X..",              custom:false},
  {id:"fl4",    name:"4 on the floor", length:4,  pattern:"X...",             custom:false},
  {id:"pulse4", name:"Pulse (4)",      length:4,  pattern:"XXXX",             custom:false},
  {id:"tres",   name:"Tresillo",       length:8,  pattern:"X..X..X.",         custom:false},
  {id:"hab",    name:"Habanera",       length:8,  pattern:"X..XX...",         custom:false},
  {id:"son32",  name:"Son 3:2",        length:16, pattern:"X..X..X...X.X...", custom:false},
  {id:"son23",  name:"Son 2:3",        length:16, pattern:"X.X....X..X..X..", custom:false},
  {id:"rum32",  name:"Rumba 3:2",      length:16, pattern:"X..X...X..X.X...", custom:false},
  {id:"shiko",  name:"Shiko",          length:16, pattern:"X...X...X...X.X.", custom:false},
  {id:"souk",   name:"Soukous",        length:16, pattern:"X..X...X.X..X...", custom:false},
  {id:"bossa",  name:"Bossa Nova",     length:16, pattern:"X..X..X...X..X..", custom:false},
  {id:"gahu",   name:"Gahu",           length:16, pattern:"X...X.X...X.X...", custom:false},
  {id:"fume",   name:"Fume-fume",      length:12, pattern:"X.X.X..X.X.X.",    custom:false},
  {id:"bembe",  name:"Bembé",          length:12, pattern:"X.X.XX.X.X.X.",    custom:false},
  {id:"samba",  name:"Samba",          length:16, pattern:"X.X.X...X.X.X...", custom:false},
];
let dict=BASE.map(r=>({...r}));

const LAYERS=[
  {id:"low",  label:"LOW",  defId:"fl4",   param:"pitch",pMin:40,  pMax:400, pVal:100, pStep:1,    volVal:0.5, fmt:v=>Math.round(v)+'Hz'},
  {id:"high", label:"HIGH", defId:"son32", param:"pitch",pMin:200, pMax:2000,pVal:440, pStep:1,    volVal:0.5, fmt:v=>Math.round(v)+'Hz'},
  {id:"noise",label:"NOISE",defId:"pulse1",param:"decay",pMin:0.02,pMax:0.6, pVal:0.3, pStep:0.01, volVal:0.25,fmt:v=>parseFloat(v).toFixed(2)+'s'},
];

let state=LAYERS.map(l=>({
  dictIdx:dict.findIndex(r=>r.id===l.defId),
  pattern:dict.find(r=>r.id===l.defId).pattern.split(''),
  shift:0,paramVal:l.pVal,volVal:l.volVal,stepPos:0,confirming:false
}));

let playing=false,timerID=null,ac=null,savingLi=null,latencyMs=0;
let halfOn=false,doubleOn=false;

function getSpeedMult(){return doubleOn?2:halfOn?0.5:1;}
function getAC(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();return ac;}
function sched(fn,ms){setTimeout(fn,Math.max(0,ms));}

function playLow(pitch,vol,lat){sched(()=>{const a=getAC(),n=a.currentTime,o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=pitch;o.type='sine';g.gain.setValueAtTime(vol,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.18);o.start(n);o.stop(n+0.19);},lat);}
function playHigh(pitch,vol,lat){sched(()=>{const a=getAC(),n=a.currentTime,o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=pitch;o.type='triangle';g.gain.setValueAtTime(vol,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.07);o.start(n);o.stop(n+0.08);},lat);}
function playNoise(decay,vol,lat){sched(()=>{const a=getAC(),n=a.currentTime,len=Math.max(0.02,decay);const buf=a.createBuffer(1,Math.ceil(a.sampleRate*len),a.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3);const src=a.createBufferSource(),g=a.createGain();src.buffer=buf;g.gain.value=vol;src.connect(g);g.connect(a.destination);src.start(n);},lat);}

function rotate(arr,n){const l=arr.length;if(!l)return arr;const k=((n%l)+l)%l;return[...arr.slice(k),...arr.slice(0,k)];}

function buildStepsDiv(li){
  const div=document.getElementById('steps-'+LAYERS[li].id);if(!div)return;div.innerHTML='';
  state[li].pattern.forEach((p,si)=>{
    const s=document.createElement('div');
    s.className='step '+(p==='X'?'on':'off')+' '+LAYERS[li].id;
    s.addEventListener('click',()=>{
      state[li].pattern[si]=state[li].pattern[si]==='X'?'.':'X';
      s.className='step '+(state[li].pattern[si]==='X'?'on':'off')+' '+LAYERS[li].id+(state[li].stepPos===si?' cur':'');
    });
    div.appendChild(s);
  });
}

function rebuildSelect(li){
  const sel=document.getElementById('sel-'+LAYERS[li].id);if(!sel)return;
  const cur=state[li].dictIdx;sel.innerHTML='';
  dict.forEach((r,i)=>{const o=document.createElement('option');o.value=i;o.textContent=r.name+' ('+r.length+')';if(i===cur)o.selected=true;sel.appendChild(o);});
}

function updateCtrlBtns(li){
  const r=dict[state[li].dictIdx];
  const trash=document.getElementById('trash-'+LAYERS[li].id);
  const conf=document.getElementById('conf-'+LAYERS[li].id);
  if(trash)trash.style.display=r&&r.custom?'inline-flex':'none';
  if(conf)conf.style.display='none';
  state[li].confirming=false;
}

function buildUI(){
  const cont=document.getElementById('layers');cont.innerHTML='';
  LAYERS.forEach((layer,li)=>{
    if(li>0){const sep=document.createElement('div');sep.className='layer-sep';cont.appendChild(sep);}
    const row=document.createElement('div');row.className='layer-row';

    const cL=document.createElement('div');cL.className='col-l';
    const selRow=document.createElement('div');selRow.className='sel-row';
    const sel=document.createElement('select');sel.id='sel-'+layer.id;
    dict.forEach((r,i)=>{const o=document.createElement('option');o.value=i;o.textContent=r.name+' ('+r.length+')';if(i===state[li].dictIdx)o.selected=true;sel.appendChild(o);});
    sel.addEventListener('change',function(){
      const idx=parseInt(this.value);state[li].dictIdx=idx;
      state[li].pattern=rotate(dict[idx].pattern.split(''),state[li].shift);
      state[li].stepPos=0;buildStepsDiv(li);updateCtrlBtns(li);
    });
    const saveIco=document.createElement('button');saveIco.className='ico-save';saveIco.title='Sauvegarder';saveIco.textContent='💾';
    saveIco.addEventListener('click',()=>openModal(li));
    selRow.appendChild(sel);selRow.appendChild(saveIco);

    const ctrlRow=document.createElement('div');ctrlRow.className='ctrl-row';
    const trashBtn=document.createElement('button');trashBtn.className='ico';trashBtn.id='trash-'+layer.id;trashBtn.innerHTML='🗑';trashBtn.style.display='none';
    trashBtn.addEventListener('click',()=>{
      if(state[li].confirming)return;state[li].confirming=true;
      document.getElementById('conf-'+layer.id).style.display='flex';
    });
    ctrlRow.appendChild(trashBtn);

    const confRow=document.createElement('div');confRow.className='confirm-row';confRow.id='conf-'+layer.id;confRow.style.display='none';
    const confTxt=document.createElement('span');confTxt.textContent='Supprimer ?';
    const okB=document.createElement('button');okB.className='ico';okB.innerHTML='✓';okB.style.color='#cc3333';
    okB.addEventListener('click',()=>{
      const idx=state[li].dictIdx;dict.splice(idx,1);
      state[li].dictIdx=Math.min(idx,dict.length-1);
      state[li].pattern=dict[state[li].dictIdx].pattern.split('');
      state[li].shift=0;
      const sn=document.getElementById('shift-num-'+layer.id);if(sn)sn.textContent='0';
      LAYERS.forEach((_,i)=>rebuildSelect(i));buildStepsDiv(li);updateCtrlBtns(li);
    });
    const noB=document.createElement('button');noB.className='ico';noB.innerHTML='✕';
    noB.addEventListener('click',()=>{state[li].confirming=false;confRow.style.display='none';});
    confRow.appendChild(confTxt);confRow.appendChild(okB);confRow.appendChild(noB);
    cL.appendChild(selRow);cL.appendChild(ctrlRow);cL.appendChild(confRow);

    const vb1=document.createElement('div');vb1.className='vbar';

    const cC=document.createElement('div');cC.className='col-c';
    const stepsDiv=document.createElement('div');stepsDiv.className='steps';stepsDiv.id='steps-'+layer.id;
    const shiftCtrl=document.createElement('div');shiftCtrl.className='shift-ctrl';
    const btnM=document.createElement('button');btnM.className='shift-btn';btnM.textContent='−';
    const shiftNum=document.createElement('span');shiftNum.className='shift-num';shiftNum.id='shift-num-'+layer.id;shiftNum.textContent='0';
    const btnP=document.createElement('button');btnP.className='shift-btn';btnP.textContent='+';
    btnM.addEventListener('click',()=>{
      state[li].shift=((state[li].shift-1+state[li].pattern.length)%state[li].pattern.length);
      shiftNum.textContent=state[li].shift;
      state[li].pattern=rotate(dict[state[li].dictIdx].pattern.split(''),state[li].shift);buildStepsDiv(li);
    });
    btnP.addEventListener('click',()=>{
      state[li].shift=(state[li].shift+1)%state[li].pattern.length;
      shiftNum.textContent=state[li].shift;
      state[li].pattern=rotate(dict[state[li].dictIdx].pattern.split(''),state[li].shift);buildStepsDiv(li);
    });
    shiftCtrl.appendChild(btnM);shiftCtrl.appendChild(shiftNum);shiftCtrl.appendChild(btnP);
    cC.appendChild(stepsDiv);cC.appendChild(shiftCtrl);

    const vb2=document.createElement('div');vb2.className='vbar';

    const cR=document.createElement('div');cR.className='col-r';
    const sndName=document.createElement('div');sndName.className='snd-name';sndName.textContent=layer.label;
    function mkSl(lbl,min,max,val,step,fmt,cb){
      const r=document.createElement('div');r.className='sl-row';
      const lb=document.createElement('label');lb.textContent=lbl;
      const sl=document.createElement('input');sl.type='range';sl.min=min;sl.max=max;sl.value=val;sl.step=step;
      const sv=document.createElement('span');sv.className='sv';sv.textContent=fmt(val);
      sl.addEventListener('input',function(){sv.textContent=fmt(this.value);cb(parseFloat(this.value));});
      r.appendChild(lb);r.appendChild(sl);r.appendChild(sv);return r;
    }
    const L=LAYERS[li];
    cR.appendChild(sndName);
    cR.appendChild(mkSl(L.param==='pitch'?'Pitch':'Decay',L.pMin,L.pMax,L.pVal,L.pStep,L.fmt,v=>state[li].paramVal=v));
    cR.appendChild(mkSl('Vol',0,1,L.volVal,0.01,v=>parseFloat(v).toFixed(2),v=>state[li].volVal=v));

    row.appendChild(cL);row.appendChild(vb1);row.appendChild(cC);row.appendChild(vb2);row.appendChild(cR);
    cont.appendChild(row);
    buildStepsDiv(li);updateCtrlBtns(li);
  });
}

function highlightAll(){
  LAYERS.forEach((layer,li)=>{
    const div=document.getElementById('steps-'+layer.id);if(!div)return;
    div.querySelectorAll('.step').forEach((s,si)=>s.classList.toggle('cur',si===state[li].stepPos));
  });
}

function tick(){
  const bpm=parseInt(document.getElementById('bpm').value);
  const interval=(60/bpm/2)*1000/getSpeedMult();
  LAYERS.forEach((layer,li)=>{
    const pat=state[li].pattern;const s=state[li].stepPos%pat.length;
    if(pat[s]==='X'){
      if(layer.id==='low')  playLow(state[li].paramVal,state[li].volVal,latencyMs);
      else if(layer.id==='high') playHigh(state[li].paramVal,state[li].volVal,latencyMs);
      else playNoise(state[li].paramVal,state[li].volVal,latencyMs);
    }
    state[li].stepPos=(state[li].stepPos+1)%pat.length;
  });
  highlightAll();
  timerID=setTimeout(tick,interval);
}

function togglePlay(){
  if(!playing){
    playing=true;state.forEach(s=>s.stepPos=0);
    document.getElementById('btn-play').textContent='Stop';
    document.getElementById('btn-play').classList.add('active');
    getAC().resume().then(tick);
  } else {
    playing=false;clearTimeout(timerID);
    document.getElementById('btn-play').textContent='Play';
    document.getElementById('btn-play').classList.remove('active');
    LAYERS.forEach(l=>{const d=document.getElementById('steps-'+l.id);if(d)d.querySelectorAll('.step').forEach(s=>s.classList.remove('cur'));});
  }
}

function openModal(li){
  savingLi=li;document.getElementById('modal-input').value='';
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(()=>document.getElementById('modal-input').focus(),50);
}

document.getElementById('btn-half').addEventListener('click',()=>{
  if(halfOn){halfOn=false;}else{halfOn=true;doubleOn=false;document.getElementById('btn-double').classList.remove('on');}
  document.getElementById('btn-half').classList.toggle('on',halfOn);
});
document.getElementById('btn-double').addEventListener('click',()=>{
  if(doubleOn){doubleOn=false;}else{doubleOn=true;halfOn=false;document.getElementById('btn-half').classList.remove('on');}
  document.getElementById('btn-double').classList.toggle('on',doubleOn);
});
document.getElementById('btn-play').addEventListener('click',togglePlay);
document.addEventListener('keydown',e=>{if(e.code==='Space'&&e.target.tagName!=='INPUT'){e.preventDefault();togglePlay();}});
document.getElementById('bpm').addEventListener('input',function(){document.getElementById('bpm-val').textContent=this.value;});
document.getElementById('latency').addEventListener('input',function(){latencyMs=parseInt(this.value);document.getElementById('lat-val').textContent=this.value+'ms';});
document.getElementById('modal-cancel').addEventListener('click',()=>document.getElementById('modal-bg').classList.remove('open'));
document.getElementById('modal-ok').addEventListener('click',()=>{
  const name=document.getElementById('modal-input').value.trim();if(!name||savingLi===null)return;
  const li=savingLi;const pat=state[li].pattern.join('');
  dict.push({id:'c_'+Date.now(),name,length:pat.length,pattern:pat,custom:true});
  state[li].dictIdx=dict.length-1;
  LAYERS.forEach((_,i)=>rebuildSelect(i));updateCtrlBtns(li);
  document.getElementById('modal-bg').classList.remove('open');
});
document.getElementById('modal-input').addEventListener('keydown',e=>{
  if(e.key==='Enter')document.getElementById('modal-ok').click();
  if(e.key==='Escape')document.getElementById('modal-cancel').click();
});

buildUI();
</script>
</body>
</html>
