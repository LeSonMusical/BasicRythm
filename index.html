<p class="encyclo-chapo">PoumTchak permet de découvrir les rythmes fondamentaux qui constituent le langage rythmique mondial : des grooves africains aux musiques électroniques, en passant par les Caraïbes et le Brésil… L'objectif est de comprendre comment des structures simples génèrent une richesse infinie. Cette appli permet d'écouter, voir, comprendre, jouer ou composer des rythmiques.</p>

<ul class="encyclo-bullets">

<li><span class="bkey">Groove</span><span class="bval">Un <strong>groove</strong> est une superposition de patterns qui forment ensemble une rythmique cohérente. Dans une section rythmique, chacun joue une cellule répétitive, et c'est leur empilement qui crée le <em>groove</em>. Dans PoumTchak, chaque ligne du groove est appelée une <em>couche</em> et joue un <strong>pattern</strong>.</span></li>

<li><span class="bkey">Pattern</span><span class="bval">Un <strong>pattern</strong> est une cellule rythmique : une séquence de sons et de silences qui se répète en boucle. Chaque pattern a un rôle fonctionnel dans l'ensemble : ancrer le temps, créer la tension, marquer le contretemps, compléter une autre couche… La combinaison de rôles différents est ce qui fait swinguer un groove.</span></li>

<li><span class="bkey">Sons &amp; instruments &nbsp;🔊</span><span class="bval">Chaque couche joue un son paramétrable via le bouton <strong>🔊</strong>. PoumTchak propose trois couches aux fonctions complémentaires : <strong>Grave</strong> (kick, basse, tambour), <strong>Aigu</strong> (snare, guitare, clave), <strong>Noise</strong> (hi-hat, pulsation, shaker). Chaque son peut être réglé en hauteur/timbre et en volume.</span></li>

<li><span class="bkey">Notation en steps &nbsp;⊞ ◎</span><span class="bval">Chaque pattern est représenté comme une grille de cases : <strong>X</strong> = son joué, <strong>.</strong> = silence. Comme un chemin pour la musique, chaque case est un pas / <strong>step</strong> — l'unité de temps de base (ici 1 step = 1 croche). PoumTchak propose deux vues du <em>chemin</em> — <strong>⊞ linéaire</strong> (grille gauche→droite) et <strong>◎ circulaire</strong> (rotation horaire depuis 12h) — pour voir les patterns différemment et mieux saisir leurs symétries.</span></li>

<li><span class="bkey">Tempo &nbsp;BPM</span><span class="bval">Le <strong>tempo</strong> (bouton <strong>BPM</strong>) règle la vitesse des steps en <strong>SPM</strong> (Steps Par Minute). Les équivalences en notation traditionnelle sont affichées : <strong>♩♩</strong> (blanche), <strong>♩</strong> (noire), <strong>♩.</strong> (noire pointée). Les boutons <strong>/2</strong> et <strong>×2</strong> divisent ou doublent le tempo de toutes les couches en restant synchronisés.</span></li>

<li style="list-style:none;padding:0;margin:4px 0"><hr style="border:none;border-top:1px solid #e0ddd8"></li>

<li><span class="bkey">&nbsp;&nbsp;◀ 0 ▶ &nbsp;Décalage</span><span class="bval">Tourne (Rotate) le pattern : déplace le point de départ sans changer les intervalles. En fonction du décalage, les appuis peuvent devenir des levés et les rapports avec les autres patterns sont bouleversés. Le Son 2:3 est un shift du Son 3:2.</span></li>

<li><span class="bkey">&nbsp;&nbsp;⊙ &nbsp;Complémentaire</span><span class="bval">Inverse chaque step : les sons joués deviennent silencieux, les silences deviennent des sons — comme le négatif d'une photo. Le <em>Four on the Floor</em> et l'<em>Off Beat</em> sont complémentaires exacts : superposés, ils forment une pulsation continue.</span></li>

<li><span class="bkey">&nbsp;&nbsp;⇄ &nbsp;Intervertir</span><span class="bval">Échange les deux moitiés du pattern. Sur 8 steps, les steps 1–4 et 5–8 sont permutés. Exemple : le Son 2:3 est une inversion du Son 3:2.</span></li>

<li><span class="bkey">&nbsp;&nbsp;✦ &nbsp;Transformations aléatoires</span><span class="bval">Applique une combinaison aléatoire de transformations (décalage, complémentaire, intervertir, vitesse). Bon point de départ pour explorer des variations inattendues d'un pattern connu.</span></li>

</ul>`;

// ─── LOCAL PLAY (encyclopédie) ────────────────────────────────────────────────
let localPlayTimerID=null;
let localPlaySchedID=null;

function stopLocalPlay(){
  if(localPlayTimerID){clearTimeout(localPlayTimerID);localPlayTimerID=null;}
  if(localPlaySchedID){clearTimeout(localPlaySchedID);localPlaySchedID=null;}
  const content=document.getElementById('encyclo-content');
  const isOpen=content&&content.classList.contains('opened');
  const btn=document.getElementById('encyclo-volet-btn');
  if(btn)btn.textContent=isOpen?'Lire ▼':'Lire ▶';
}

function startLocalPlay(patternStr, onStop){
  if(!ac){ac=new(window.AudioContext||window.webkitAudioContext)();}
  ac.resume(); // fire-and-forget — iOS 18
  const go=()=>{
    const pat=patternStr.split('');
    const spm=parseInt(document.getElementById('bpm').value);
    const beatSec=60/spm;
    const totalSteps=pat.length*2; // 2 cycles
    let step=0;
    function tick(){
      if(playing||step>=totalSteps){stopLocalPlay();return;}
      const si=step%pat.length;
      if(pat[si]==='X'){
        const t=ac.currentTime;
        playSound(soundState[1],t);
      }
      step++;
      if(step<totalSteps){
        localPlaySchedID=setTimeout(tick,beatSec*1000);
      } else {
        localPlayTimerID=setTimeout(()=>{stopLocalPlay();if(onStop)onStop();},beatSec*1000);
      }
    }
    tick();
  };
  go();
}

// ─── PLAYBACK ─────────────────────────────────────────────────────────────────
function startPlay(){
  playing=true;
  const a=getAC();
  const now=a.currentTime;
  LAYERS.forEach((_,li)=>{
    state[li].stepPos=0;
    state[li].nextStepTime=now;
    state[li].startTime=now;
  });
  scheduler();
  visualRafID=requestAnimationFrame(visualLoop);
}

function stopPlay(){
  playing=false;
  stopLocalPlay(); // global play coupe le local play
  clearTimeout(schedTimerID);
  cancelAnimationFrame(visualRafID);
  LAYERS.forEach(l=>{
    const d=document.getElementById('steps-'+l.id);
    if(d)d.querySelectorAll('.step').forEach(s=>s.classList.remove('cur'));
  });
  if(typeof circleView!=='undefined'&&circleView) drawCircles();
}

function togglePlay(){
  if(!playing){
    stopLocalPlay();
    if(!ac){ac=new(window.AudioContext||window.webkitAudioContext)();}
    ac.resume();
    document.getElementById('btn-play').textContent='■';
    document.getElementById('btn-play').classList.add('active');
    startPlay();
  } else {
    stopPlay();
    document.getElementById('btn-play').textContent='▶';
    document.getElementById('btn-play').classList.remove('active');
  }
}

// ─── CIRCULAR VIEW ────────────────────────────────────────────────────────────
let circleView=false;
// LOW=blue center, HIGH=orange mid, NOISE=green outer
const LAYER_COLORS=[
  {fill:'#378ADD',stroke:'#185FA5',track:'rgba(55,138,221,0.35)'},   // LOW  — inner
  {fill:'#D85A30',stroke:'#993C1D',track:'rgba(216,90,48,0.35)'},    // HIGH — mid
  {fill:'#1D9E75',stroke:'#0F6E56',track:'rgba(29,158,117,0.35)'},   // NOISE — outer
];
// radii: index 0=LOW inner, 1=HIGH mid, 2=NOISE outer
// RADII_FRAC computed dynamically in drawCircles based on R
// flash state: flashStep[li] = step index that is currently flashing yellow
const flashStep=[-1,-1,-1];

function resizeCanvas(){
  const cv=document.getElementById('rhythm-canvas');if(!cv)return;
  const wrap=document.getElementById('circle-view');
  const isLandscape=window.innerWidth>=600;

  // canvas size derived from circle geometry (dotR=10, r2=r0+4*dotR)
  const dotR=10,r0=16*dotR/Math.PI,r2=r0+4*dotR;
  const szBase=Math.round(2*(r2+dotR+2)/0.88);  // ~234px — fits circles exactly

  let sz;
  // landscape: exact fit; portrait: scale down 75% via CSS transform
  sz=szBase;
  cv.width=sz;cv.height=sz;
  cv.style.transform='';  // reset

  if(!isLandscape){
    const scale=0.92;
    cv.style.transform='scale('+scale+')';
    cv.style.transformOrigin='top center';
    wrap.style.width='100%';
    // top: dotR/2 space; bottom: no extra
    wrap.style.height=Math.round(sz*scale+dotR/2)+'px';
    cv.style.marginTop=Math.round(-dotR/2)+'px';
  } else {
    // landscape: constrain wrap height to visual canvas size to remove void
    const visSz=Math.round(sz*0.90);
    wrap.style.width='';
    wrap.style.height=visSz+'px';
    cv.style.marginTop='';cv.style.marginBottom='';
    cv.style.transform='scale(0.90) translateY(-18%)';
    cv.style.transformOrigin='center center';
  }
  drawCircles();
}

function stepAngle(si,total){
  // step 0 at top (12h = -π/2), clockwise
  return -Math.PI/2 + (2*Math.PI*si/total);
}

function drawCircles(){
  const cv=document.getElementById('rhythm-canvas');if(!cv)return;
  const ctx=cv.getContext('2d');
  const W=cv.width,H=cv.height,cx=W/2,cy=H/2,R=(W/2-8)*0.88; // 12% margin
  // r0: 16 dots touch on inner circle → 2π*r0/16 = 2*dotR → r0 = 16*10/π
  const dotR=10;
  const r0=16*dotR/Math.PI; // ~50.9px — inner circle radius (abs)
  const RADII_FRAC=[r0/(R*2), (r0+dotR*2)/(R*2), (r0+dotR*4)/(R*2)];
  ctx.clearRect(0,0,W,H);

  const now=playing?getAC().currentTime:0;

  // compute needle fraction (layer 0 reference)
  let needleFrac=0;
  if(playing){
    const bs=getBeatSec(0),el=now-state[0].startTime;
    const cycleLen=bs*state[0].pattern.length;
    needleFrac=((el%cycleLen)+cycleLen)%cycleLen/cycleLen;
  }
  const needleAngle=-Math.PI/2+needleFrac*2*Math.PI;

  // draw layers (order: outer first so inner draws on top)
  [2,1,0].forEach(li=>{
    const pat=state[li].pattern;
    const n=pat.length;
    const r=RADII_FRAC[li]*R*2;
    const col=LAYER_COLORS[li];
    const dotR=10;

    // thin track ring (1px)
    ctx.beginPath();ctx.arc(cx,cy,r,0,2*Math.PI);
    ctx.strokeStyle=col.track;ctx.lineWidth=1;ctx.stroke();

    // compute which step the needle is currently on for this layer
    let needleSi=-1;
    if(playing){
      const bs=getBeatSec(li),el=now-state[li].startTime;
      needleSi=Math.floor(el/bs)%n;
      // update flash: if needle just moved to a new X step, flash it
      if(needleSi!==flashStep[li]){
        flashStep[li]=needleSi;
      }
    }

    for(let si=0;si<n;si++){
      const a=stepAngle(si,n);
      const dx=cx+r*Math.cos(a),dy=cy+r*Math.sin(a);
      const isOn=pat[si]==='X';
      const isFlash=playing&&si===flashStep[li]&&isOn;
      const isMuted=state[li].muted;

      ctx.beginPath();ctx.arc(dx,dy,dotR,0,2*Math.PI);
      if(isFlash&&!isMuted){
        // yellow flash for currently played X step
        ctx.fillStyle='#f5c518';ctx.fill();
        ctx.strokeStyle='#c89a00';ctx.lineWidth=1.5;ctx.stroke();
      } else if(isOn){
        ctx.fillStyle=isMuted?col.fill+'66':col.fill;ctx.fill();
        ctx.strokeStyle=col.stroke;ctx.lineWidth=1;ctx.stroke();
      } else {
        ctx.fillStyle='#f0ede8';ctx.fill();
        ctx.strokeStyle='#c8c5c0';ctx.lineWidth=0.75;ctx.stroke();
      }
    }
  });

  // 3 needles, one per layer, length = ring radius, colored
  LAYERS.forEach((layer,li)=>{
    const r=RADII_FRAC[li]*R*2;
    const col=LAYER_COLORS[li];
    // compute this layer's needle angle
    let frac=0;
    if(playing){
      const bs=getBeatSec(li),el=now-state[li].startTime;
      const cyc=bs*state[li].pattern.length;
      frac=((el%cyc)+cyc)%cyc/cyc;
    }
    const ang=-Math.PI/2+frac*2*Math.PI;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+r*Math.cos(ang),cy+r*Math.sin(ang));
    ctx.strokeStyle=col.stroke;ctx.lineWidth=1.5;
    ctx.lineCap='round';ctx.stroke();
    ctx.restore();
  });
  // center pivot
  ctx.beginPath();ctx.arc(cx,cy,3,0,2*Math.PI);
  ctx.fillStyle='#1a1a18';ctx.fill();
}

function circleHitTest(x,y){
  const cv=document.getElementById('rhythm-canvas');if(!cv)return null;
  const W=cv.width,cx=W/2,cy=W/2,R=(W/2-8)*0.88;
  const dotR=10;
  const r0=16*dotR/Math.PI;
  const RADII_FRAC=[r0/(R*2),(r0+dotR*2)/(R*2),(r0+dotR*4)/(R*2)];
  for(let li=0;li<LAYERS.length;li++){
    const pat=state[li].pattern;
    const n=pat.length;
    const r=RADII_FRAC[li]*R*2;
    for(let si=0;si<n;si++){
      const a=stepAngle(si,n);
      const dx=cx+r*Math.cos(a),dy=cy+r*Math.sin(a);
      if(Math.hypot(x-dx,y-dy)<=dotR+5) return {li,si};
    }
  }
  return null;
}

function setupCanvasInteraction(){
  const cv=document.getElementById('rhythm-canvas');if(!cv)return;
  function onPt(ex,ey){
    const rect=cv.getBoundingClientRect();
    const scaleX=cv.width/rect.width,scaleY=cv.height/rect.height;
    const hit=circleHitTest((ex-rect.left)*scaleX,(ey-rect.top)*scaleY);
    if(!hit)return;
    const{li,si}=hit;
    state[li].pattern[si]=state[li].pattern[si]==='X'?'.':'X';
    setDirty(li,true);
    if(!circleView)buildStepsDOM(li,state[li].wrapped);
    drawCircles();
  }
  cv.addEventListener('click',e=>onPt(e.clientX,e.clientY));
  cv.addEventListener('touchend',e=>{e.preventDefault();const t=e.changedTouches[0];onPt(t.clientX,t.clientY);},{passive:false});
}

// define visualLoopCircle (referenced in visualLoop dispatcher above)
visualLoopCircle=function(){
  if(!playing)return;
  const now=getAC().currentTime;
  drawCircles();
  visualRafID=requestAnimationFrame(visualLoopCircle);
};

function setView(circle){
  circleView=circle;
  document.body.classList.toggle('view-circle',circle);
  document.getElementById('btn-view').textContent=circle?'⊞':'◎';
  document.getElementById('btn-view').title=circle?'Vue linéaire':'Vue circulaire';

  cancelAnimationFrame(visualRafID);
  visualRafID=null;

  LAYERS.forEach((layer,li)=>{
    const bSteps=document.getElementById('steps-btn-'+layer.id);
    const bModSel=document.getElementById('mod-sel-btn-'+layer.id);
    const er=document.getElementById('edit-rows-'+layer.id);
    const menu=er&&er.closest('.layer-top')?.querySelector('.layer-menu');
    const stepsOuter=er&&er.closest('.layer-top')?.querySelector('.layer-steps-outer');

    if(bSteps)bSteps.style.display=circle?'none':'';
    if(bModSel)bModSel.style.display=circle?'':'none';

    if(er){
      if(circle&&menu&&er.parentElement!==menu){
        menu.appendChild(er);
      } else if(!circle&&stepsOuter&&er.parentElement!==stepsOuter){
        stepsOuter.appendChild(er);
      }
    }
  });

  if(circle){
    setTimeout(()=>{resizeCanvas();setupCanvasInteraction();},30);
    setTimeout(resizeCanvas,150);
    flashStep[0]=flashStep[1]=flashStep[2]=-1;
    const cvReset=document.getElementById('rhythm-canvas');if(cvReset){cvReset.style.marginTop='';cvReset.style.marginBottom='';}
    LAYERS.forEach(l=>{const d=document.getElementById('steps-'+l.id);if(d)d.querySelectorAll('.step').forEach(s=>s.classList.remove('cur'));});
    if(playing) visualRafID=requestAnimationFrame(visualLoopCircle);
  } else {
    LAYERS.forEach((_,li)=>{buildStepsDOM(li,false);setTimeout(()=>checkWrap(li),0);});
    if(playing) visualRafID=requestAnimationFrame(visualLoop);
  }
}

document.getElementById('btn-view').addEventListener('click',()=>setView(!circleView));

// ─── VOLET ABOUT → géré par l'encyclopédie (_poumtchak) ──────────────────────
document.getElementById('btn-about').addEventListener('click',()=>{
  const btn=document.getElementById('btn-about');
  const es=document.getElementById('encyclo-select');
  const content=document.getElementById('encyclo-content');
  // encloBtn remplacé par toggleEncyclo
  // toggle : si déjà sur _poumtchak et ouvert → fermer
  const isOpen=content&&content.classList.contains('opened');
  const isCurrent=es&&es.value==='_poumtchak';
  if(isOpen&&isCurrent){
    toggleEncyclo(false);
    
    btn.classList.remove('active');
  } else {
    if(es){es.value='_poumtchak';renderEncyclo('_poumtchak');}
    if(content&&content.classList.contains('closed')){
      toggleEncyclo(true);
      
    }
    btn.classList.add('active');
  }
});

let jouerOpen=false;

function toggleJouer(force){
  jouerOpen=force!==undefined?force:!jouerOpen;
  document.getElementById('play-drawer').classList.toggle('open',jouerOpen);
  document.getElementById('btn-jouer').classList.toggle('active',jouerOpen);
}

function thumbFlash(btn){
  btn.classList.remove('flash');
  void btn.offsetWidth;
  btn.classList.add('flash');
}

function setupThumb(btnId,isRight){
  const btn=document.getElementById(btnId);
  function fire(e){
    e.preventDefault();
    if(!ac){ac=new(window.AudioContext||window.webkitAudioContext)();}
    ac.resume();
    playConga(isRight);
    thumbFlash(btn);
  }
  btn.addEventListener('pointerdown',fire);
}

(function buildBandBar(){
  const bar=document.getElementById('band-bar');if(!bar)return;
  bar.innerHTML='';

  const lbl=document.createElement('span');
  lbl.className='scene-bar-label';lbl.style.color='#2d5f80';lbl.textContent='Band';

  const sel=document.createElement('select');sel.id='band-style-select';
  sel.style.cssText='font-size:10px;flex:1;min-width:0;max-width:140px;padding:1px 2px;border:1px solid #8ab4d0;border-radius:4px;background:#fff;color:#1a1a18';
  BAND_STYLES.forEach(s=>{
    const o=document.createElement('option');o.value=s.id;o.textContent=s.label;sel.appendChild(o);
  });
  sel.addEventListener('change',()=>applyBandStyle(sel.value));

  const btnSave=document.createElement('button');
  btnSave.className='btn-scene-ico';btnSave.title='Sauvegarder ce band';btnSave.textContent='💾';
  btnSave.addEventListener('click',()=>{
    // future: sauvegarder band custom
  });

  const btnVolet=document.createElement('button');
  btnVolet.className='btn-volet btn-volet-groove open';btnVolet.id='btn-band-volet';
  btnVolet.style.color='#4A7FA5';btnVolet.style.marginLeft='auto';
  btnVolet.textContent='Sons ▼';btnVolet.title='Afficher/masquer les sons';
  const content=document.getElementById('band-content');
  // ouvert par défaut — fermer
  if(content)content.classList.remove('open');
  btnVolet.textContent='Sons ▶';btnVolet.classList.remove('open');
  btnVolet.addEventListener('click',()=>{
    if(!content)return;
    const open=content.classList.toggle('open');
    btnVolet.textContent=open?'Sons ▼':'Sons ▶';
    btnVolet.classList.toggle('open',open);
    if(open)buildSoundPanel();
  });

  bar.appendChild(lbl);bar.appendChild(sel);bar.appendChild(btnSave);bar.appendChild(btnVolet);
})();
