<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PoumTchak</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
*{user-select:none;-webkit-user-select:none}
.encyclo-wrap,.encyclo-chapo,.encyclo-bullets{user-select:text;-webkit-user-select:text}
input,textarea{user-select:text;-webkit-user-select:text}

body{font-family:system-ui,-apple-system,sans-serif;font-size:12px;background:#f5f4f0;color:#1a1a18;min-height:100vh;padding-top:56px;padding-bottom:68px;overflow-x:hidden;width:100%}
.frame{background:#fff;width:100%;max-width:900px;min-width:0;margin:0 auto;padding:.5rem .85rem}
/* === LAYOUT GLOBAL === */
.app-name{font-size:14px;font-weight:700;letter-spacing:.06em;color:#1a1a18}
.app-version{font-size:9px;color:#aaa;font-weight:400;margin-left:3px}
.tx-badge{font-size:9px;padding:1px 5px;background:#ffeedd;border:1px solid #D85A30;border-radius:3px;color:#993C1D;font-weight:600;margin-left:4px}
/* CHEVRON VOLET */
.btn-volet{padding:2px 5px;cursor:pointer;font-size:10px;font-weight:500;background:transparent;border:none;border-radius:4px;color:#bbb;flex-shrink:0;white-space:nowrap;transition:color .12s}
.btn-volet:hover{color:#555}
.btn-volet.open{color:#555}
.btn-volet-groove{color:#C8961A}.btn-volet-groove:hover{color:#8B6914}.btn-volet-groove.open{color:#8B6914}
.btn-volet-encyclo{color:#888}.btn-volet-encyclo:hover{color:#333}.btn-volet-encyclo.open{color:#333}

/* === TOP BAR (ligne 1 fixe) === */
.top-bar{position:fixed;top:0;left:0;right:0;z-index:80;background:#fff;border-bottom:1px solid #d0cec7;display:flex;align-items:center;justify-content:space-between;padding:6px 12px;gap:8px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.top-bar-left{display:flex;align-items:center;gap:4px;flex-shrink:0}
.top-bar-center{display:flex;align-items:center;gap:6px}
.top-bar-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.btn-top{padding:3px 9px;cursor:pointer;font-size:11px;font-weight:600;background:#fff;border:1px solid #c0bdb7;border-radius:5px;color:#555;letter-spacing:.03em}
.btn-top:hover{background:#e8e5e0}
.btn-top.active{background:#d0cec7;border-color:#888;color:#1a1a18}
.btn-about{padding:1px 7px;font-size:11px;font-weight:700;background:#fff;border:1px solid #c0bdb7;border-radius:50%;color:#888;cursor:pointer;line-height:1.5}
.btn-about:hover{background:#e8e5e0}
.btn-about.active{background:#d0cec7;color:#1a1a18}
.btn-view{padding:3px 8px;font-size:13px;border:2px solid #d0cec7;border-radius:5px;cursor:pointer;background:#fff;color:#666}
.btn-view:hover{background:#e8e5e0}
.btn-view.active{border-color:#F5C518;background:#fffbe8;color:#1a1a18}

/* PANNEAU TEMPO — dans le flux sous la top-bar */
.panel2{background:#e8e5e0;border-bottom:1px solid #c8c5c0;overflow:hidden;transition:max-height .22s ease,padding .22s ease;max-height:0;padding:0 .85rem}
.panel2.open{max-height:160px;padding:.5rem .85rem}
.panel2-inner{display:none}.panel2-inner.active{display:block}

/* === BOTTOM BAR (fixe) === */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:80;background:#fff;border-top:2px solid #d0cec7;display:flex;align-items:stretch;height:60px;box-shadow:0 -2px 8px rgba(0,0,0,.08)}
.bottom-left{flex:1;display:flex;align-items:center;justify-content:center}
.bottom-center{display:flex;align-items:center;justify-content:center;padding:0 16px}
.bottom-right{flex:1;display:flex;align-items:center;justify-content:center}
.btn-play-main{height:44px;padding:0 28px;font-size:22px;font-weight:700;border:2px solid #F5C518;border-radius:10px;background:#fff;color:#1a1a18;cursor:pointer;transition:background .1s}
.btn-play-main:hover{background:#fffbe8}
.btn-play-main.active{background:#F5C518;border-color:#d4a800}
.btn-jouer{height:52px;padding:0 14px;cursor:pointer;font-size:11px;font-weight:700;background:#fff;border:2px solid #1D9E75;border-radius:10px;color:#1D9E75;display:flex;align-items:center;gap:4px;white-space:nowrap}
.btn-jouer:hover{background:#ddfff4}
.btn-jouer.active{background:#1D9E75;color:#fff}
.btn-jouer .hand{font-size:28px;line-height:1}

/* === VOLET JOUER (surimpression au-dessus bottom bar) === */
.play-drawer{position:fixed;bottom:60px;left:0;right:0;z-index:90;background:#1a1a18;border-radius:16px 16px 0 0;padding:12px 12px 16px;display:none}
.play-drawer.open{display:block}
.play-drawer-bar{display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.play-drawer-close{background:none;border:none;color:#888;font-size:13px;cursor:pointer;padding:4px 12px;border-radius:20px}
.play-drawer-close:hover{color:#fff;background:#333}
.play-btns{display:flex;gap:12px;align-items:center;justify-content:center}
.play-thumb{flex:1;max-width:46%;height:80px;border-radius:40px;border:none;cursor:pointer;font-size:13px;font-weight:600;color:#fff;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.play-thumb:active{filter:brightness(1.3)}
.play-thumb.flash{animation:thumbflash .18s ease-out}
.play-thumb-l{background:#7B5EA7}
.play-thumb-r{background:#C8961A}
@keyframes thumbflash{0%{filter:brightness(1)}50%{filter:brightness(2.2) saturate(1.5)}100%{filter:brightness(1)}}

/* === BOUTONS GÉNÉRAUX === */
.btn{padding:4px 12px;cursor:pointer;font-size:12px;font-weight:500;background:#fff;border:1px solid #b0aea7;border-radius:6px;color:#1a1a18}
.btn:hover{background:#f0ede8}
.btn.active{background:#ddeeff;border-color:#5599cc;color:#1155aa}
.t-tempo-wrap{display:flex;flex-direction:column;gap:4px}
.t-line-tempo{display:flex;align-items:center;gap:8px}
.t-label{font-size:10px;color:#888;font-weight:400}
.t-slider-wrap{display:flex;flex-direction:column;align-items:center;gap:1px;flex:1;max-width:200px}
.t-spm-display{font-size:11px;color:#999;font-weight:400;cursor:pointer;text-align:center}
.t-spm-display:hover{color:#555}
.t-spm-input{font-size:11px;width:70px;text-align:center;border:1px solid #5599cc;border-radius:4px;padding:1px 4px;outline:none}
.t-slider{width:100%;accent-color:#888}
.t-equiv-line{display:flex;align-items:center;gap:8px;justify-content:center}
.t-equiv{font-size:13px;font-weight:500;color:#1a1a18;white-space:nowrap;letter-spacing:.02em}
.btn-sm-tempo{padding:3px 8px;cursor:pointer;font-size:11px;background:#fff;border:1px solid #b0aea7;border-radius:5px;color:#666}
.btn-sm-tempo:hover{background:#f0ede8}
.btn-sm-tempo.active{background:#ddeeff;border-color:#5599cc;color:#1155aa}
.hdivider{height:1px;background:#e0ddd8;margin:.4rem 0}
/* PLAY CHAPO inline */
.chapo-play{padding:1px 5px;font-size:10px;cursor:pointer;background:transparent;border:1px solid #c0bdb7;border-radius:3px;color:#666;margin-left:4px;line-height:1.4;vertical-align:middle}
.chapo-play:hover{background:#e8e5e0}
.chapo-play.playing{background:#F5C518;border-color:#d4a800}
/* === LAYOUT BASE === */
#layers-wrap{display:flex;align-items:flex-start;gap:0}
#layers{flex:1;display:flex;flex-direction:column;gap:4px;min-width:0}
#circle-view{display:none;align-items:center;justify-content:center;flex-shrink:0;overflow:visible}
#rhythm-canvas{display:block;touch-action:none;cursor:pointer;max-width:100%;max-height:100%}
/* MUTE */
.btn-mute-sq{width:26px;height:26px;flex-shrink:0;border:none;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;background:var(--cc);transition:background .15s;padding:0;line-height:1}
.btn-mute-sq.muted{background:#c8c5c0}.btn-mute-sq:hover{filter:brightness(.9)}
.layer.muted-layer{background:#f0ede855 !important}
/* EDIT ROWS */
.edit-rows{display:flex;flex-direction:row;flex-wrap:wrap;align-items:center;gap:3px;margin-top:2px}
.edit-rows.hidden{display:none}
.erow-shift,.erow-speed,.erow-comp{display:contents}
.btn-info-ico{padding:1px 5px;cursor:pointer;font-size:10px;font-weight:700;background:transparent;border:1px solid #c0bdb7;border-radius:4px;color:#666;flex-shrink:0;line-height:1.4;min-width:20px;text-align:center}
.btn-info-ico:hover{background:#e8e5e0}
.btn-info-ico.active{background:#d0cec7;border-color:#888;color:#1a1a18}
/* steps / mod */
.layer-steps-wrap{flex:1;display:flex;flex-direction:row;align-items:flex-start;gap:4px;padding:4px 5px 4px 6px;min-width:0}
.layer-steps-wrap.hidden-steps{display:none}
.steps-mod-sep{height:1px;background:var(--cs);margin:2px 0}
.btn-mod-wrap{display:flex;flex-shrink:0;align-self:flex-start;padding-top:2px}
.btn-mod-wrap.hidden{display:none}
/* SCÈNE / RYTHMIQUE */
.scene-bar{display:flex;align-items:center;gap:5px;padding:.3rem .5rem;border-bottom:1px solid #e0ddd8;margin-bottom:4px;background:#faf3e0;border-left:3px solid #C8961A;border-radius:4px}
.scene-bar select{font-size:10px;flex:1;min-width:0;padding:1px 3px;border:1px solid #d4b86a;border-radius:4px;background:#fff;color:#1a1a18}
.scene-bar-label{font-size:10px;font-weight:600;color:#8B6914;flex-shrink:0;letter-spacing:.03em}
.btn-scene-ico{cursor:pointer;font-size:13px;background:none;border:none;padding:1px 3px;line-height:1;opacity:.55;flex-shrink:0}
.btn-scene-ico:hover{opacity:1}

/* circle mode */
body.view-circle .layer-steps-wrap{display:none}
body.view-circle .layer-steps-outer{display:none}
body.view-circle .layer-menu{width:100%;border-right:none}
body.view-circle #circle-view{display:flex !important;width:100%;justify-content:center;align-items:center}
body.view-circle .step{border-radius:50%}
body.view-circle #layers-wrap{flex-direction:column}
body.view-circle #hdivider-after-layers{margin:0}
body.view-circle .btn-steps-toggle{display:none}

/* landscape ≥600px */
@media(min-width:600px){
  #layers-wrap{flex-direction:row}
  /* paysage-circle: canvas à droite, même layout couches qu'en linéaire */
  body.view-circle #layers-wrap{flex-direction:row;align-items:stretch}
  body.view-circle #circle-view{display:flex;flex:1;align-self:stretch;min-width:0;align-items:center;justify-content:center}
  
}

.c-low  {--cc:#378ADD;--cb:#185FA5;--cl:#378ADD0D;--cs:#378ADD55;--ct:#ddeeff}
.c-high {--cc:#D85A30;--cb:#993C1D;--cl:#D85A300D;--cs:#D85A3055;--ct:#ffeedd}
.c-noise{--cc:#1D9E75;--cb:#0F6E56;--cl:#1D9E750D;--cs:#1D9E7555;--ct:#ddfff4}
.c-thumb-l{--cc:#7B5EA7;--cb:#5A3F85;--cl:#7B5EA70D;--cs:#7B5EA755;--ct:#f0eaff}
.c-thumb-r{--cc:#C8961A;--cb:#8B6914;--cl:#C8961A0D;--cs:#C8961A55;--ct:#fff4d0}

.rhythm-section{display:flex;flex-direction:column;gap:4px}

/* LAYER */
.layer{display:flex;flex-direction:column;border-radius:5px;overflow:hidden;border-left:3px solid var(--cc);background:var(--cl);min-height:34px}
.layer-top{display:flex;align-items:stretch}
.layer-steps-outer{flex:1;display:flex;flex-direction:column;min-width:0}

.sel-row{display:flex;align-items:center;gap:2px}
.modified-tag{font-size:8px;color:#c0580a;display:none;padding-left:1px}
.modified-tag.show{display:block}

.ctrl-icons{display:flex;align-items:center;gap:2px}
.ico-save{cursor:pointer;font-size:11px;background:none;border:none;padding:0;line-height:1;opacity:.55;flex-shrink:0;transition:color .15s}
.ico-save:hover{opacity:1}
.ico-save.dirty{opacity:1;filter:hue-rotate(-30deg) saturate(3) brightness(.85)}
.ico{padding:1px 3px;cursor:pointer;font-size:10px;background:none;border:1px solid #d0cec7;border-radius:2px;color:#666;line-height:1.3;display:inline-flex;align-items:center;flex-shrink:0}
.ico:hover{background:rgba(0,0,0,.06)}
.confirm-row{display:flex;align-items:center;gap:2px;font-size:9px;color:#666;flex-shrink:0}

.steps{display:flex;gap:2px;align-items:flex-start;flex-wrap:wrap;flex:1;min-width:0}
.step{width:20px;height:20px;border-radius:3px;border:1px solid #d0cec7;background:#f0ede8;flex-shrink:0;cursor:pointer;transition:background .05s}
.step:hover{border-color:#aaa}
.step.on{background:var(--cs);border-color:var(--cc)}
.step.cur{background:var(--cc) !important;border-color:var(--cb) !important}
.step.off.cur{background:#bbb !important;border-color:#888 !important}
.muted-layer .step.on{background:#c8c5c0 !important;border-color:#a0a09a !important}
.muted-layer .step.cur{background:#aaa !important;border-color:#888 !important}

/* LAYER MENU — wider, holds edit controls below select row */
.layer-menu{display:flex;flex-direction:column;gap:2px;width:min(33%,200px);flex-shrink:0;padding:4px 6px 4px 5px;border-right:1px solid var(--cs)}
.layer-menu select{font-size:9px;flex:1;min-width:0;padding:1px 2px;border:1px solid #ccc;border-radius:4px;background:#fff;color:#1a1a18}
.ico-save{cursor:pointer;font-size:15px;background:none;border:none;padding:2px 3px;line-height:1;opacity:.55;flex-shrink:0}
.ico-mute{cursor:pointer;font-size:15px;background:none;border:none;padding:2px 3px;line-height:1;opacity:.55;flex-shrink:0}
.ico-mute.active{opacity:1}
.edit-btn{padding:1px 4px;cursor:pointer;font-size:11px;background:none;border:1px solid #d0cec7;border-radius:2px;color:#666;line-height:1.3;flex-shrink:0}
.edit-btn:hover{background:rgba(0,0,0,.06)}
.edit-btn.on{background:var(--cs);border-color:var(--cc);color:var(--cb);font-weight:500}
.shift-num{min-width:16px;text-align:center;font-size:10px;color:#666}

/* COLLAPSIBLES */
.collapsible-btn{display:flex;align-items:center;gap:4px;background:none;border:none;cursor:pointer;font-size:10px;color:#999;padding:3px 0;width:100%;text-align:left}
.collapsible-btn:hover{color:#555}
.collapsible-btn .arr{font-size:8px;transition:transform .15s;display:inline-block}
.collapsible-btn.open .arr{transform:rotate(90deg)}
.collapsible-content{overflow:hidden;transition:max-height .25s ease}
.collapsible-content.closed{max-height:0}
.collapsible-content.opened{max-height:2000px}
#encyclo-content.opened{
  max-height:calc(100vh - 56px - 60px);
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
#encyclo-content.opened .encyclo-wrap{max-height:none;padding-right:4px}
/* header encyclopédie — style volet fermé */
#encyclo-header{border-left:3px solid #888;background:#f5f4f0;border-radius:4px;padding:4px 8px;margin-bottom:2px}

/* SOUND */
.sound-layers{display:flex;flex-direction:column;gap:3px;padding-bottom:4px}
.sound-layer{border-radius:5px;overflow:hidden;border:1px solid var(--cs);border-left:3px solid var(--cc);background:var(--cl);margin-bottom:3px}
.sound-layer-header{display:flex;align-items:center;gap:6px;padding:5px 8px;cursor:pointer;user-select:none;-webkit-user-select:none}
.sound-layer-header:hover{filter:brightness(.97)}
.sound-lbl{font-size:10px;font-weight:600;color:var(--cb);white-space:nowrap;flex-shrink:0}
.sound-layer-arrow{font-size:13px;color:var(--cb);opacity:.7;transition:transform .15s;flex-shrink:0}
.sound-layer-arrow.open{transform:rotate(90deg)}
/* slider volume horizontal dans header */
.vol-h-wrap{flex:1;display:flex;align-items:center;gap:3px;min-width:0}
.vol-h-lbl{font-size:8px;color:var(--cb);opacity:.6;flex-shrink:0}
.vol-h-track{flex:1;height:4px;background:var(--cs);border-radius:2px;position:relative;cursor:pointer;min-width:30px}
.vol-h-fill{position:absolute;left:0;top:0;height:100%;background:var(--cc);border-radius:2px;pointer-events:none}
.vol-h-thumb{position:absolute;top:50%;width:12px;height:12px;background:var(--cc);border:2px solid #fff;border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 1px 3px rgba(0,0,0,.2);pointer-events:none}
/* contenu ouvert */
.sound-ctrls{border-top:1px solid var(--cs)}
.sound-ctrls.hidden{display:none}
.sound-ctrls-left{display:flex;flex-direction:column;gap:2px;padding:4px 8px 5px}
.sl-row{display:flex;align-items:center;gap:4px}
.sl-row label{font-size:9px;color:#888;width:36px;flex-shrink:0}
.sl-row input[type=range]{flex:1;padding:0;accent-color:var(--cc)}
.params-inner{padding:4px 0 2px}

/* ENCYCLOPÉDIE */
.encyclo-wrap{padding:6px 0 4px}
.encyclo-select-row{margin-bottom:10px}
.encyclo-select-row select{font-size:11px;padding:3px 6px;border:1px solid #ccc;border-radius:5px;background:#fff;color:#1a1a18;max-width:260px}
.encyclo-chapo{font-size:12px;line-height:1.65;color:#2a2a28;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #e8e6e2}
.encyclo-bullets{list-style:none;display:flex;flex-direction:column;gap:8px}
.encyclo-bullets li{display:flex;flex-direction:column;gap:2px;font-size:11px;line-height:1.6}
.encyclo-bullets li .bkey{font-weight:500;color:#1a1a18}
.encyclo-bullets li .bval{color:#555;padding-left:10px}
.encyclo-empty{font-size:11px;color:#aaa;font-style:italic}
.collapsible-btn.encyclo-main-btn{font-size:11px;color:#444;font-weight:500;margin-top:6px;border-top:1px solid #e0ddd8;padding-top:6px}
.collapsible-btn.encyclo-main-btn:hover{color:#1a1a18}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border:1px solid #c0bdb7;border-radius:12px;padding:1rem 1.25rem;min-width:220px;box-shadow:0 4px 24px rgba(0,0,0,.12)}
.modal h3{font-size:13px;font-weight:500;margin-bottom:.75rem}
.modal input[type=text]{width:100%;font-size:12px;padding:4px 7px;border:1px solid #c0bdb7;border-radius:6px;background:#f5f4f0;color:#1a1a18;margin-bottom:.75rem}
.modal input[type=text]:focus{outline:none;border-color:#5599cc}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}

/* DRAWER SONS */
/* VOLET BAND — clone de scene-bar, couleur bleue */
.band-bar{display:none;align-items:center;gap:5px;padding:.3rem .5rem;border-bottom:1px solid #c8dff0;margin-bottom:4px;background:#eef4f8;border-left:3px solid #4A7FA5;border-radius:4px}
.band-bar.open{display:flex}
.band-bar select{font-size:10px;flex:1;min-width:0;padding:1px 3px;border:1px solid #8ab4d0;border-radius:4px;background:#fff;color:#1a1a18}
.band-bar-label{font-size:10px;font-weight:600;color:#2d5f80;flex-shrink:0;letter-spacing:.03em}
.btn-band-ico{cursor:pointer;font-size:13px;background:none;border:none;padding:1px 3px;line-height:1;opacity:.55;flex-shrink:0}
.btn-band-ico:hover{opacity:1}
/* contenu collapsible Band */
.band-content{overflow:hidden;transition:max-height .22s ease;max-height:0}
.band-content.open{max-height:500px}
/* couche son — header cliquable + contenu collapsible */
/* btn Jouer ligne 2 */
.btn-jouer{padding:4px 10px;cursor:pointer;font-size:13px;font-weight:600;background:transparent;border:2px solid #1D9E75;border-radius:6px;color:#1D9E75;letter-spacing:.03em}
.btn-jouer:hover{background:#ddfff4}
.btn-jouer.active{background:#1D9E75;color:#fff}
/* scroll encyclopédie */
/* scroll encyclopédie géré par #encyclo-content.opened */


@media(max-width:599px){
  body{padding:.4rem}
  .frame{padding:.55rem .6rem;border-radius:8px}
  .layer-top{flex-direction:column}
  .layer-menu select{font-size:10px}
  .layer-menu{width:100%;padding:3px 5px;border-right:none;border-bottom:1px solid var(--cs)}
  .edit-row{gap:3px}
  .layer-steps-wrap{padding:4px 5px}
  .step{width:22px;height:22px}
  .encyclo-bullets li .bval{padding-left:8px}
}
/* LANDSCAPE >= 600px */
@media(min-width:600px){
  #layers-wrap{flex-direction:row}
}
</style>
</head>
<body>
<!-- TOP BAR -->
<div class="top-bar">
  <div class="top-bar-left">
    <span class="app-name">PoumTchak</span>
    <span class="app-version">v1.5</span>
    <span id="tx-badge" class="tx-badge" style="display:none">TX</span>
  </div>
  <div class="top-bar-center">
    <button class="btn-top" id="btn-panel-bpm" title="Tempo">Tempo</button>
    <button class="btn-top" id="btn-panel-sons" title="Sons &amp; instruments">Sons</button>
  </div>
  <div class="top-bar-right">
    <button class="btn-view" id="btn-view" title="Vue circulaire">⊞</button>
    <button class="btn-about" id="btn-about" title="PoumTchak — À propos">?</button>
  </div>
</div>

<script>
const GROUPS=[

const DICT=[
  {id:"pulse1", name:"Pulse",              length:1,  pattern:"X",          encyclo:false},
  {id:"bin2",   name:"Bin (1:2)",          length:2,  pattern:"X.",         encyclo:false},

  {id:"pulse4", name:"Pulse (4:4)",        length:4,  pattern:"XXXX",       encyclo:false},
  {id:"sync4",  name:"Double Up (2:4)",    length:4,  pattern:"..XX",       encyclo:false},
  {id:"silence",name:"Silence",            length:4,  pattern:"....",       encyclo:false},
  {id:"_salsa_low",name:"Tresillo (2)",   length:8,  pattern:"..X..X..",  encyclo:false},
  {id:"tres",   name:"Tresillo",           length:8,  pattern:"X..X..X.",   encyclo:"tres"},
  {id:"cinq",   name:"Cinquillo",          length:8,  pattern:"X.XX.XX.",   encyclo:"cinq"},
  {id:"hab",    name:"Habanera",           length:8,  pattern:"X..XX.X.",   encyclo:"hab"},
  {id:"afoxe",  name:"Afoxê / Bolero",    length:8,  pattern:"X..X.X..",   encyclo:"afoxe"},
  {id:"reggae", name:"Clave Reggae",       length:8,  pattern:"....X.X.",   encyclo:"reggae"},
  {id:"son32",  name:"Son 3:2",            length:16, pattern:"X..X..X...X.X...", encyclo:"son32"},
  {id:"son",    name:"Son (2:3)",          length:16, pattern:"..X.X...X..X..X.", encyclo:"son"},
  {id:"rum32",  name:"Rumba 3:2",          length:16, pattern:"X..X...X..X.X...", encyclo:"rum32"},
  {id:"shiko",  name:"Shiko",             length:16, pattern:"X...X.X...X.X...", encyclo:"shiko"},
  {id:"bossa",  name:"Bossa Nova",         length:16, pattern:"X..X..X...X..X..", encyclo:"bossa"},
  {id:"gahu",   name:"Gahu",              length:16, pattern:"X..X..X...X...X.", encyclo:"gahu"},
  {id:"souk",   name:"Soukous",           length:16, pattern:"X..X..X...XX....", encyclo:"souk"},
  {id:"samba",  name:"Samba",             length:16, pattern:"X..X.X.X..X.X.X.", encyclo:"samba"},
  {id:"cascara",name:"Cascara 3:2",        length:16, pattern:"X.XX.X.XX.X.XX.X", encyclo:"cascara"},
  {id:"tumbao", name:"Tumbao",            length:16, pattern:"X.XX.X.X.X.X.X.X", encyclo:"tumbao"},
  {id:"fume",   name:"Fume-fume",         length:12, pattern:"X.X.X..X.X..",    encyclo:"fume"},
  {id:"bembe",  name:"Bembé",            length:12, pattern:"X.X.XX.X.X.X",    encyclo:"bembe"},

];
let dict=DICT.map(r=>({...r,custom:false}));

const ENCYCLO={
  fl4:{chapo:"Le \"Four on the Floor\" est le rythme fondateur des musiques de danse électronique — une frappe sur chaque temps binaire (les temps 2 et 4 d'une mesure à 4/4, soit toutes les croches paires sur 8 pas). Sa régularité absolue ancre physiquement l'auditeur et synchronise les corps en masse. Il est indissociable de son complémentaire exact, l'Off Beat, qui frappe exactement là où lui se tait — ensemble ils forment le métronome binaire du dancefloor.",bullets:[["Origine","Disco américain, années 70 — DJ Frankie Knuckles, Larry Levan à New York et Chicago ; popularisé en Europe par la scène house puis techno des années 80-90."],["Écritures","X.X.X.X.\nFrappe sur chaque temps binaire (croches 1,3,5,7)\n4 frappes sur 8 pas"],["Utilisation","Techno, house, EDM, disco ; base universelle des musiques de dancefloor depuis 50 ans."],["Sensation","Ancrage total, prévisibilité rassurante, énergie par accumulation et non par tension."],["Relations","Complémentaire exact de l'Off Beat (2,4) : là où l'un frappe, l'autre se tait — les superposer produit le Pulse (4:4) continu."]]},
  offbeat:{chapo:"L'Off Beat est le complémentaire exact du Four on the Floor — il frappe précisément sur les contretemps, là où son partenaire se tait. Ensemble ils forment le métronome binaire fondamental du dancefloor disco et électronique. L'Off Beat seul crée cette sensation de suspension et de rebond caractéristique du groove de danse — le corps anticipe la frappe suivante en s'appuyant sur l'absence.",bullets:[["Origine","Disco américain, années 70 — même héritage que le Four on the Floor ; le skank reggae et le upstroke funk sont des ancêtres directs."],["Écritures",".X.X.X.X\nFrappe sur chaque contretemps (croches 2,4,6,8)\n4 frappes sur 8 pas — complémentaire exact du Four on the Floor"],["Logique","Four on the Floor + Off Beat = Pulse (4:4) — deux rythmes opposés dont l'union forme la pulsation continue. Joués ensemble par deux instruments différents, ils créent la texture rythmique de base du disco et de la house."],["Sensation","Suspension, rebond, légèreté — le groove est porté par l'anticipation plutôt que par l'appui."],["Utilisation","Guitare rythmique funk et disco (le \"chicken scratch\") ; piano ou orgue en house ; hi-hat ouvert en techno ; clap ou snare en pop."],["Relations","Complémentaire du Four on the Floor ; apparenté au skank reggae (Off Beat sur 2 temps) et au upstroke funk."]]},
  tres:{chapo:"Le Tresillo est probablement le pattern rythmique le plus répandu dans les musiques populaires mondiales — trois frappes sur 8 pas, distribution euclidienne maximale. On le retrouve dans quasiment toutes les musiques issues de la diaspora africaine aux Amériques et au-delà, souvent sans qu'il soit nommé. Il est à la fois un rythme autonome et un sous-composant d'autres rythmes plus complexes du dictionnaire. Sa simplicité apparente cache une tension rythmique réelle avec la pulsation binaire.",bullets:[["Origine","Terme cubain, mais le pattern est pan-africain et pan-américain ; présent dans les Caraïbes, le Brésil, la Nouvelle-Orléans."],["Écritures","X..X..X.\nIntervalles : 3-3-2\nE(3,8) — distribution euclidienne maximale sur 8 pas"],["Logique","Le 1er coup lance le rythme ; le 2e coup (\"bombo\", au pas 4) crée l'élan ; le 3e coup (\"ponche\", au pas 7) résout — c'est l'asymétrie finale (intervalle 2 au lieu de 3) qui génère la tension caractéristique."],["Utilisation","Blues, jazz, cumbia, son cubain ; la main gauche du piano de Hound Dog d'Elvis ; de nombreuses lignes de basse hip-hop."],["Relations","Sous-composant de Son 3:2 (les 3 premières frappes) ; présent dans Cinquillo, Habanera et Rumba par déformation ou extension."]]},
  cinq:{chapo:"Le Cinquillo est l'un des rythmes fondateurs de la musique afro-cubaine, né de l'extension et de la densification du Tresillo. Cinq frappes sur 8 pas, il remplit l'espace laissé libre par son ancêtre en intercalant deux frappes supplémentaires. Présent dans la contradanza du XIXe siècle, il a traversé le danzón, le mambo et le cha-cha-chá, devenant un composant-clé de la généalogie rythmique cubaine. Comprendre le Cinquillo, c'est comprendre comment le Tresillo s'est complexifié au contact de la musique européenne.",bullets:[["Origine","Cuba, XIXe siècle ; contradanza afro-cubaine, ancêtre direct du danzón et du mambo."],["Écritures","X.XX.XX.\nIntervalles : 2-1-2-1-2\n5 frappes sur 8 pas"],["Logique","C'est le Tresillo avec des coups ajoutés juste avant le bombo (pas 3) et le ponche (pas 6) — même squelette, densité presque doublée."],["Sensation","Plus nerveux et syncopé que le Tresillo, sentiment d'urgence et de rebond continu."],["Utilisation","Contradanza, danzón, mambo ; Pérez Prado, Tito Puente ; composant de nombreux patterns de percussion afro-cubains."],["Relations","Extension directe du Tresillo ; intermédiaire entre Tresillo (3 frappes) et Pulse (5 frappes continues sur 8)."]]},
  hab:{chapo:"La Habanera est un rythme né à La Havane au début du XIXe siècle, issu du contradanse européen métissé de rythmes africains. Elle a voyagé vers l'Espagne et l'Amérique latine avec une facilité remarquable, devenant l'un des premiers rythmes de la diaspora afro-cubaine à pénétrer la musique savante européenne. Sa structure est celle du Tresillo avec une frappe supplémentaire intercalée, ce qui lui donne un caractère à la fois dansant et élégant.",bullets:[["Origine","La Havane, début XIXe ; importée en Espagne où elle influence le flamenco et la zarzuela ; Bizet l'utilise dans Carmen (1875)."],["Écritures","X..XX.X.\nIntervalles : 3-1-2-2\nTresillo + contretemps au pas 4"],["Sensation","Balancement asymétrique, légèreté malgré la syncope, caractère dansé et élégant."],["Utilisation","Tango argentin (qui en descend directement), bolero cubain, blues américain (Hey Bo Diddley) ; Carmen de Bizet (1875) popularise la Habanera en Europe savante."],["Anecdote","Bo Diddley a construit toute sa carrière sur ce pattern — appelé \"Bo Diddley beat\" en Amérique du Nord, sans que personne ne sache toujours qu'il vient de La Havane."]]},
  afoxe:{chapo:"L'Afoxê (ou Ijexá) est un rythme afro-brésilien de Salvador de Bahia, issu de la tradition yoruba-nagô du candomblé. Distinct de la Samba, il appartient à une famille rythmique plus proche des racines africaines — les mêmes qui ont engendré le Bembé à Cuba. Il est le rythme des cortèges d'afoxê, processions carnavalesques qui maintiennent vivant le lien avec la culture yoruba en plein Carnaval brésilien. Sa douceur hypnotique contraste avec la puissance explosive de la Samba.",bullets:[["Origine","Salvador de Bahia (Brésil) ; tradition yoruba-nagô du candomblé ; l'Afoxê Filhos de Gandhi (fondé en 1949) est le groupe le plus célèbre."],["Écritures","X..X.X..\nIntervalles : 3-2-3\n3 frappes sur 8 pas"],["Sensation","Douceur hypnotique, balancement lent et profond, sentiment de procession — à l'opposé de l'urgence de la Samba."],["Utilisation","Carnaval de Salvador, candomblé ; Gilberto Gil et Caetano Veloso l'ont popularisé internationalement dans les années 70-80."],["Relations","Même nombre de frappes que le Tresillo (3 sur 8) mais distribution différente (3-2-3 vs 3-3-2) — comparer les deux révèle comment un même nombre de frappes peut produire des caractères radicalement différents."],["Anecdote","Gil a composé Patuscada de Gandhi (1969) pour l'Afoxê Filhos de Gandhi — l'un des premiers morceaux à ancrer l'identité afro-brésilienne dans la musique populaire."]]},
  reggae:{chapo:"La Clave Reggae est le pattern fondateur de la rythmique jamaïcaine — deux frappes sur 8 pas, placées sur le contretemps du 3e temps et son \"et\". Née dans le ska et le rocksteady des années 60, elle s'est imposée comme l'ADN rythmique du reggae roots des années 70. Sa caractéristique la plus frappante est l'absence totale de frappe sur les 4 premiers pas — ce silence initial est précisément ce qui crée la sensation de \"retard\" caractéristique du reggae, ce groove pesant et suspendu qui a influencé la quasi-totalité de la musique populaire mondiale.",bullets:[["Origine","Jamaïque. La racine profonde est le mento, musique folk jamaïcaine du XIXe siècle (fusion rythmes africains et mélodies européennes), ancêtre direct du ska, du rocksteady et du reggae. Le skank — accord de guitare ou piano sur les contretemps 2 et 4 — et l'appui profond sur le 3e temps sans frapper le 1er sont les signatures sonores du reggae. Sly Dunbar en a le plus défini l'esthétique à la batterie."],["Écritures","....X.X.\nIntervalles : 4-2-2\n2 frappes sur 8 pas — vide des 4 premiers pas constitutif"],["Logique","Grosse caisse sur le 3e temps (pas 5) et son contretemps (pas 7) — inversion complète du 4 on the floor."],["Sensation","Pesanteur, suspension, sentiment d'être \"derrière\" la pulsation — le groove le plus \"late\" du dictionnaire."],["Utilisation","Reggae roots, dub — Bob Marley, Lee Scratch Perry, King Tubby ; absorbé par le hip-hop, le trip-hop (Massive Attack, Portishead), le grime britannique."],["Relations","Complémentaire du 4 on the floor : là où l'un frappe, l'autre se tait — les superposer crée une conversation fondamentale entre avant et arrière du temps."]]},
  son32:{chapo:"Le Son clave est le squelette rythmique de toute la musique afro-cubaine — né de la rencontre entre rythmes bantous et guitare espagnole dans l'Oriente cubain au XIXe siècle. Joué aux claves, deux bâtons de bois dur, il structure une famille musicale entière qui a rayonné mondialement. Son asymétrie fondamentale — 5 frappes inégalement réparties sur 16 pas — est précisément ce qui génère le groove syncopé caractéristique de la salsa. C'est l'un des rythmes les plus influents du XXe siècle, présent explicitement ou implicitement dans une proportion considérable de la musique populaire mondiale.",bullets:[["Origine","Cuba, XIXe siècle, confluence yoruba/bantou et espagnole ; \"clave\" désigne à la fois l'instrument et la fonction structurelle (\"clé\" en espagnol)."],["Utilisation","Son montuno, salsa, latin jazz — Celia Cruz, Tito Puente, Buena Vista Social Club ; absorbé en hip-hop (Timbaland), implicite dans le reggaeton."],["Écritures","X..X..X...X.X...\nIntervalles : 3-3-4-2-4\nE(5,16)"],["Logique","La partie \"3\" (3 frappes) crée l'élan, la partie \"2\" (2 frappes) pose la résolution — l'asymétrie génère une tension permanente avec la pulsation."],["Sensation","Groove tiré en avant, sentiment d'incomplétude qui appelle la résolution, quasi-impossible de rester immobile."],["Relations","Rotation miroir = \"Son\" (2:3) ; Rumba 3:2 en est la variante par déplacement d'une frappe ; les 3 premières frappes forment un Tresillo."],["Anecdote","Dans la tradition cubaine, \"jouer contre la clave\" est la faute musicale suprême — un orchestre entier peut s'arrêter pour corriger."]]},
  son:{chapo:"Le Son 2:3 est la rotation du Son clave 3:2 — les mêmes 5 frappes décalées de 8 pas, ce qui inverse la logique élan/résolution. Ce n'est pas un rythme séparé mais une position différente du même pattern dans le cycle. Dans la pratique cubaine, les deux formes coexistent et dialoguent au sein d'un même morceau, créant une conversation rythmique continue entre musiciens.",bullets:[["Écritures","..X.X...X..X..X.\nRotation du Son 3:2 (décalage 8 pas)\nRésolution en premier"],["Sensation","Plus posé que le 3:2, sentiment d'être \"derrière le temps\", légère flottaison."],["Usage","Certains instruments jouent en 2:3 pendant que d'autres tiennent le 3:2 — c'est cette superposition qui crée la richesse de la clave."],["Relations","Même pattern que Son 3:2, décalage de 8 pas — comprendre les deux ensemble est essentiel pour saisir la logique de la clave."]]},
  rum32:{chapo:"La Rumba clave est la cousine \"africaine\" du Son — plus proche des racines yoruba et bantou, moins métissée avec l'harmonie européenne. Elle diffère du Son par le déplacement d'une seule frappe (la 3e, avancée d'un pas), ce qui la fait sonner plus \"derrière le temps\" et plus funky. C'est le rythme de la rumba cubaine traditionnelle (yambu, guaguancó, columbia) — à ne pas confondre avec la \"rumba\" européenne, déformation commerciale.",bullets:[["Origine","Cuba, communautés afro-cubaines du XIXe siècle ; la rumba est une forme populaire urbaine, pas un rythme de cérémonie."],["Écritures","X..X...X..X.X...\nIntervalles : 3-4-3-2-4\n3e frappe du Son 3:2 avancée d'un pas"],["Sensation","Plus \"derrière le temps\" que le Son, groove plus lourd, sentiment de retenue puis de lâcher."],["Utilisation","Guaguancó notamment ; Carlos Santana l'utilise abondamment dans ses arrangements latins."],["Relations","Variante du Son 3:2 par déplacement d'une seule frappe — même nombre de pas, même nombre de frappes, caractère sensiblement différent."]]},
  shiko:{chapo:"Le Shiko est un des rythmes fondamentaux de l'Afrique de l'Ouest, issu des peuples Ewe du Ghana et du Togo. Sa structure euclidienne — 5 frappes sur 16 pas — le place dans la même famille mathématique que le Son cubain, mais son caractère est radicalement différent : plus circulaire, moins tendu, plus hypnotique. Il est moins connu en Occident que la clave mais structurellement aussi central dans son contexte d'origine.",bullets:[["Origine","Ewe (Ghana/Togo) ; joué aux tambours dans les cérémonies communautaires."],["Écritures","X...X.X...X.X...\nIntervalles : 4-2-4-2-4\nE(5,16)"],["Logique","Alternance régulière 4-2 créant un balancement en deux temps inégaux — plus régulier que la clave, moins de tension élan/résolution."],["Sensation","Groove circulaire et hypnotique, sensation de rotation continue, moins \"tiré en avant\" que la clave."],["Utilisation hors Afrique","Étudié par les ethnomusicologues occidentaux depuis les années 70 (Kofi Agawu, David Locke) ; le pattern apparaît implicitement dans certaines compositions de Steve Reich et Philip Glass influencées par le minimalisme africain ; la structure 4-2-4-2-4 est citée dans les traités de composition algorithmique comme exemple de régularité maximale."],["Relations","Même E(5,16) que Son 3:2, Bossa Nova et Gahu — trois façons différentes de placer 5 frappes sur 16 pas."]]},
 
  souk:{chapo:"Le Soukous est le rythme de la rumba congolaise, né à Kinshasa et Brazzaville dans les années 40-60 de la fusion entre la rumba cubaine importée par des disques, les rythmes bantous et la guitare électrique. Il est l'exemple parfait d'un aller-retour culturel : la rumba afro-cubaine, elle-même issue des rythmes bantous, revient en Afrique centrale et y génère une nouvelle forme musicale autonome.",bullets:[["Origine","Congo-Kinshasa et Congo-Brazzaville, années 50-60 ; Franco Luambo et l'OK Jazz, Tabu Ley Rochereau ; \"soukous\" vient du français \"secouer\"."],["Écritures","X..X..X...XX....\nVariante du Son 3:2\nCondensation des deux dernières frappes"],["Sensation","Groove léger et dansant, en avant du temps, accroche immédiate."],["Utilisation","Musique de danse populaire dans toute l'Afrique subsaharienne depuis les années 70 ; a influencé l'afrobeat et la world music des années 80-90."],["Anecdote","Le retour du rythme bantou en Afrique via Cuba est l'un des exemples les plus frappants de \"boucle culturelle\" dans l'histoire de la musique populaire."]]},
  bossa:{chapo:"La Bossa Nova est née à Rio de Janeiro en 1958 de la rencontre entre la samba brésilienne, le cool jazz américain et une nouvelle génération de musiciens cariocas. João Gilberto, en tapant ce pattern à la guitare tout en chantant et jouant les accords, a créé une texture entièrement nouvelle. Sa structure euclidienne sur 16 pas donne une fluidité très différente de la samba traditionnelle dont elle est issue.",bullets:[["Origine","Rio de Janeiro, 1958 ; João Gilberto, Tom Jobim, Vinicius de Moraes — Chega de Saudade est le premier enregistrement."],["Écritures","X..X..X...X..X..\nIntervalles : 3-3-4-3-3\nE(5,16) — seule forme quasi-symétrique de la famille"],["Singularité","Seul rythme de la famille E(5,16) avec une quasi-symétrie entre les deux moitiés. La sensation de flottaison vient surtout du fait que tous les coups sauf le premier tombent en contretemps — l'auditeur est constamment décalé par rapport à la pulsation."],["Sensation","Légèreté, swing sans lourdeur, sentiment de suspension perpétuelle — le temps semble glisser plutôt que marcher."],["Utilisation","Jazz international dès 1962 (Stan Getz, The Girl from Ipanema) ; influence durable sur le jazz, la pop brésilienne et le lounge."],["Relations","Même E(5,16) que Son 3:2, Shiko, Gahu — famille commune, caractère radicalement différent."]]},
  gahu:{chapo:"Le Gahu est un rythme de danse des Ewe du Ghana, apparu dans les années 40 et intégrant des influences extérieures. C'est l'un des rythmes africains les plus étudiés par les ethnomusicologues occidentaux, notamment par John Miller Chernoff dans African Rhythm and African Sensibility (1979). Sa structure euclidienne le rapproche du Son cubain tout en sonnant radicalement différent par son grand vide central.",bullets:[["Origine","Ewe du Ghana, milieu XXe siècle ; danse communautaire mixte ; son nom évoquerait l'argent (\"ga\"), signalant une danse plus \"moderne\"."],["Écritures","X..X..X...X...X.\nIntervalles : 3-3-4-4-2\nE(5,16) — vide central caractéristique"],["Logique","Le grand intervalle central de 4+4 crée un \"vide\" inhabituel au milieu du pattern — c'est lui qui donne au Gahu son caractère suspendu."],["Sensation","Groove aéré, suspension au milieu du cycle, résolution rapide en fin de pattern."],["Utilisation hors Afrique","John Miller Chernoff l'analyse en détail dans African Rhythm and African Sensibility (1979) ; le pattern est enseigné dans les universités occidentales comme modèle d'organisation euclidienne du temps ; Randy Weston et d'autres jazzmen ont exploré des structures similaires après leurs voyages en Afrique."],["Relations","Troisième membre de la famille E(5,16) avec Son 3:2 et Shiko ; le vide central le distingue nettement des deux autres."]]},
 
  samba:{chapo:"La Samba est le rythme national brésilien, né à Rio de Janeiro au début du XXe siècle dans les communautés afro-brésiliennes. Sa structure sur 16 pas est plus dense que la Bossa Nova qui en dérive, avec 7 frappes créant un enchevêtrement caractéristique. C'est un rythme collectif, conçu pour être joué par de nombreux instruments simultanément, chacun apportant un pattern complémentaire.",bullets:[["Origine","Rio de Janeiro, début XXe siècle ; communautés bahianaises installées dans les favelas ; institutionnalisé par le Carnaval."],["Écritures","X..X.X.X..X.X.X.\nIntervalles : 3-2-2-3-2-2-2\nE(7,16) — structure quasi-palindromique"],["Logique","Trois coups sur le temps (pas 1, 4, 7) suivis de trois coups en contretemps (pas 9, 11, 13, 15) — ce dialogue constant entre temps et contretemps crée une tension permanente qui appelle le corps à se mouvoir. La structure quasi-palindromique donne le sentiment de \"revenir au départ\" à chaque cycle."],["Sensation","Énergie explosive et en avant du temps. Le dialogue temps/contretemps crée une impulsion/réponse permanente — le corps reçoit l'appui sur le temps et répond sur le contretemps, ce qui rend le groove physiquement irrésistible."],["Utilisation","Samba de enredo (Carnaval), pagode, samba-funk ; Jorge Ben Jor, Seu Jorge."],["Relations","Même densité que Bembé (7 frappes) mais sur 16 pas — sensation très différente, moins oppressante."]]},
  fume:{chapo:"Le Fume-fume est un des rythmes fondateurs de la musique Ewe du Ghana, utilisé comme rythme-référence (\"bell pattern\") dans les cérémonies collectives. Sur base 12, il répartit 6 frappes en deux groupes asymétriques, créant un pattern qui peut être lu comme commençant à plusieurs endroits selon l'accent culturel. C'est l'un des rythmes les plus analysés dans l'ethnomusicologie africaine.",bullets:[["Origine","Ewe (Ghana/Togo) ; joué à la cloche (gankogui) pour organiser les autres instruments de l'ensemble. Également appelé \"clave africaine\" dans certains traités d'ethnomusicologie."],["Écritures","X.X.X..X.X..\nIntervalles : 2-2-3-2-3\nE(6,12)"],["Singularité","Peut être entendu en 3 (deux groupes de 6) ou en 2 (trois groupes de 4) selon l'acculturation — rythme \"ambigu\" jouant sur la frontière binaire/ternaire."],["Sensation","Oscillation, ambiguïté métrique, sensation de \"toupie\" pouvant basculer d'un côté ou de l'autre."],["Relations","Complémentaire exact de Bembé — les 6 pas de l'un sont les 6 silences de l'autre."],["Utilisation hors Afrique","Steve Reich l'utilise dans Music for 18 Musicians (1976) et le cite comme inspiration directe de ses recherches sur le phasing ; Philip Glass en explore des structures voisines ; en jazz, le pianiste Randy Weston a intégré des bell patterns ewe après plusieurs séjours au Maroc et au Ghana."],["Anecdote","La découverte du Fume-fume par les compositeurs minimalistes américains dans les années 70 a transformé la musique contemporaine occidentale — un des passages de culture musicale les plus directs entre Afrique et États-Unis."]]},
 
  cascara:{chapo:"La Cáscara 3:2 (\"coquille\" en espagnol) est le pattern rythmique joué sur la coque métallique des timbales dans la salsa et la musique afro-cubaine. C'est l'épine dorsale du timbalero dans les sections douces d'un arrangement — elle structure le temps en interloquant avec la clave sans la doubler. Dense, continue, asymétrique, elle est à la salsa ce que le charley est au jazz : l'horloge interne qui fait swinguer le tout. Sa relation à la clave en fait un outil d'analyse puissant pour comprendre la construction rythmique cubaine.",bullets:[["Origine","Cuba, ensembles de salsa et de son des années 40-60 ; jouée sur les timbales par le timbalero ; \"palito\" (petit bâton) dans les contextes folkloriques sur un tube de bambou (güagüa)."],["Écritures","X.XX.X.XX.X.XX.X\nIntervalles : 2-1-2-2-1-2-2-1-2-1\n10 frappes sur 16 pas"],["Logique","Elle contient toutes les frappes de la clave Son 3:2 plus des frappes supplémentaires — on peut l'entendre comme la clave enrichie d'un contrechant constant."],["Sensation","Dense et régulière en surface, elle crée un tapis rythmique continu sur lequel les autres instruments brodent — groove de fond, pas de groove de surface."],["Utilisation","Timbales en salsa (sections verses, piano solos) ; Tito Puente, Willie Colón ; sur drum set, jouée sur le rebord de la caisse claire ou du floor tom."],["Relations","Complémentaire partiel de la clave Son 3:2 — les deux ensemble couvrent presque tous les 16 pas ; à comparer avec la Samba (même densité, famille différente)."]]},
  tumbao:{chapo:"Le Tumbao est le pattern de piano (ou tres) fondamental de la musique cubaine — ce que les Nord-Américains appellent montuno. Né dans le son montuno avec Arsenio Rodríguez qui remplace la guitare par le piano dans les années 40, il est devenu le langage universel du piano en salsa, mambo et timba. Ce pattern syncopé, presque entièrement en contretemps, crée une pulsation harmonique hypnotique sur laquelle repose tout le groove afro-cubain.",bullets:[["Origine","Cuba, son montuno, années 30-40 ; Arsenio Rodríguez introduit le piano dans le conjunto cubain ; Lilí Martínez Griñán en est l'un des premiers grands maîtres."],["Écritures","X.XX.X.X.X.X.X.X\nPattern de piano (guajeo/montuno)\nPrequement tous les coups sont en contretemps"],["Logique","Le pianiste joue des accords syncopés en arpèges, anticipant la pulsation et créant un flux mélodico-rythmique continu. Le pattern s'organise strictement par rapport à la clave — jouer \"contre la clave\" est la faute musicale suprême."],["Sensation","Tapis harmonique hypnotique, propulsion, sentiment que les accords \"flottent\" au-dessus du tempo — le moteur mélodique du groove salsa."],["Utilisation","Piano en salsa, son montuno, mambo, timba ; Pupy Pedroso, Iván Melón Lewis, Peruchín ; transmis au tres cubain et à la guitare rythmique congolaise (rumba africaine)."],["Relations","Distinct du tumbao de basse (pattern de contrebasse) avec lequel il s'interloque — les deux ensemble définissent le groove afro-cubain ; s'organise toujours par rapport au Son 3:2."]]},
  solea:{chapo:"La Soleá est la mère du flamenco — le palo (style) le plus fondamental, celui par lequel commence traditionnellement l'apprentissage de la guitare flamenca. Son compás (rythme) de 12 temps avec des accents sur les temps 3, 6, 8, 10 et 12 est une structure unique au monde, à la frontière du binaire et du ternaire, qui a engendré toute une famille de styles flamencos. Sa gravité, sa tension et sa résolution en font le véhicule privilégié des émotions les plus profondes du flamenco.",bullets:[["Origine","Andalousie (Espagne), probablement Séville et Cadix, XVIIIe-XIXe siècle ; transmission orale dans les communautés gitanes ; Juan Martín la décrit comme \"le cœur du flamenco\"."],["Écritures","..X..X.X.X.X\nAccents sur les temps 3-6-8-10-12\n5 frappes sur 12 pas — structure 3+3+2+2+2"],["Logique","Le compás commence sur un silence (temps 1 muet, caractéristique du flamenco), la tension monte par les accents 3 et 6, culmine sur 8, résout sur 10-12 — arc dramatique en un seul cycle."],["Singularité","L'amalgame binaire/ternaire (6/8 + 3/4) crée une ambiguïté métrique qui est précisément la source de l'expressivité flamenco — l'artiste joue avec cette tension."],["Sensation","Gravité, lenteur intérieure, dignité — la Soleá est le temple du duende flamenco ; elle ne se précipite jamais."],["Utilisation","Guitare solo, chant (cante jondo), danse ; Paco de Lucía, Camarón de la Isla, Manuela Vargas ; toute la famille des cantiñas (alegrías, caracoles) en est dérivée."],["Relations","Même compás 12 temps que Bembé et Fume-fume, mais accentuation radicalement différente — comparer les trois révèle comment la même grille peut produire des univers distincts."]]},
  bembe:{chapo:"Le Bembé est un rythme de cérémonie yoruba, joué dans la Santería cubaine pour l'invocation des Orishas, avec des équivalents structurels chez les Ewe du Ghana et les Yoruba du Nigeria. C'est le rythme euclidien le plus dense du dictionnaire sur base 12 — 7 frappes sur 12 pas, laissant à peine de l'espace. Cette densité quasi-continue produit une tension hypnotique sans repos qui explique son usage rituel. Il a profondément influencé le jazz modal et la musique minimaliste occidentale.",bullets:[["Origine","Yoruba (Nigeria/Bénin), transplanté à Cuba avec la traite ; \"Bembé\" désigne aussi la cérémonie elle-même."],["Utilisation","Rituels de Santería (Cuba) ; jazz modal : Miles Davis Kind of Blue (1959), Coltrane Africa/Brass (1961), Wayne Shorter — le pattern sous-tend l'ostinato africain de nombreuses compositions modales ; Steve Reich, Drumming (1971) et Clapping Music (1972)."],["Écritures","X.X.XX.X.X.X\nIntervalles : 2-2-1-2-2-2\nE(7,12) — maximum euclidien sur base 12"],["Singularité","Un seul intervalle d'1 pas (entre frappes 5 et 6) — micro-accentuation caractéristique, comme un trébuchement contrôlé."],["Relations","Complémentaire exact de Fume-fume ; même densité que Samba (7 frappes) mais sur 12 pas — plus oppressant."],["Sensation","Urgence hypnotique, absence de respiration, état de transe — la densité est fonctionnelle, pas décorative."],["Anecdote","Reich découvre ce rythme en étudiant la musique Ewe au Ghana en 1970 — principe du phasing qu'il exploitera dans toute son œuvre."]]}
};

let sceneModified=false;
function markSceneModified(){
  sceneModified=true;
  const sel=document.getElementById('scene-select');
  if(!sel)return;
  const cur=[...sel.options].find(o=>o.selected&&o.value&&!o.disabled);
  if(cur&&!cur.dataset.modified){
    cur.dataset.origName=cur.textContent;
    cur.dataset.modified='1';
    cur.textContent=cur.textContent+' •modifié';
    cur.style.fontStyle='italic';
    cur.style.color='#c0580a';
  }
}
function clearSceneModified(){
  sceneModified=false;
  const sel=document.getElementById('scene-select');
  if(!sel)return;
  [...sel.options].forEach(o=>{
    if(o.dataset.modified){
      o.textContent=o.dataset.origName||o.textContent.replace(' •modifié','');
      o.style.fontStyle='';o.style.color='';
      delete o.dataset.modified;delete o.dataset.origName;
    }
  });
}

  ]},
  {id:'bossanova',name:'Bossa Nova',  custom:false, layers:[

  ]},

    {patId:'fl4',     shift:0, halfOn:false, doubleOn:false, muted:false},

];

function applyScene(sceneId){
  const sc=scenes.find(s=>s.id===sceneId);if(!sc)return;
  LAYERS.forEach((layer,li)=>{
    const sl=sc.layers[li];if(!sl)return;
    const idx=dict.findIndex(r=>r.id===sl.patId);if(idx<0)return;
    state[li].dictIdx=idx;
    state[li].pattern=dict[idx].pattern.split('');
    // appliquer shift
    if(sl.shift){
      state[li].pattern=rotate(state[li].pattern,state[li].pattern.length-sl.shift);
    }
    state[li].shift=0;state[li].shiftCount=sl.shift||0;state[li].wrapped=false;
    state[li].muted=sl.muted;
    state[li].halfOn=sl.halfOn;state[li].doubleOn=sl.doubleOn;
    state[li].pendingHalf=false;state[li].pendingDouble=false;state[li].pendingClear=false;
    clearDirty(li);
  });
  // tempo global
  const newMult=sc.globalDouble?2:1;
  globalSpeedMult=newMult;pendingGlobalMult=newMult;
  const bh=document.getElementById('btn-global-half');
  const bd=document.getElementById('btn-global-double');
  if(bh)bh.classList.toggle('active',newMult===0.5);
  if(bd)bd.classList.toggle('active',newMult===2);
  clearSceneModified();
  // rebuild UI
  buildRhythmLayers();
  buildSoundPanel();
  LAYERS.forEach((_,li)=>{
    setTimeout(()=>checkWrap(li),0);
  });
  // resync : si en lecture, repartir du step 0 sur toutes les couches
  if(playing){
    clearTimeout(schedTimerID);
    const now=getAC().currentTime;
    LAYERS.forEach((_,li)=>{
      state[li].stepPos=0;
      state[li].nextStepTime=now;
      state[li].startTime=now;
    });
    scheduler();
  }
}

function buildSceneSelect(sel){
  sel.innerHTML='';
  const stdOpt=document.createElement('option');stdOpt.value='';stdOpt.textContent='— Rythmique —';stdOpt.disabled=true;stdOpt.selected=true;
  sel.appendChild(stdOpt);
  const customs=scenes.filter(s=>s.custom);
  const stds=scenes.filter(s=>!s.custom);
  stds.forEach(s=>{const o=document.createElement('option');o.value=s.id;o.textContent=s.name;sel.appendChild(o);});
  if(customs.length){
    const sep=document.createElement('option');sep.disabled=true;sep.textContent='─ ─ ─ ─ ─';sel.appendChild(sep);
    customs.forEach(s=>{const o=document.createElement('option');o.value=s.id;o.textContent=s.name;sel.appendChild(o);});
  }
}

function buildSceneBar(){
  const bar=document.getElementById('scene-bar');if(!bar)return;
  bar.innerHTML='';
  const lbl=document.createElement('span');lbl.className='scene-bar-label';lbl.textContent='Groove';
  const sel=document.createElement('select');sel.id='scene-select';
  sel.style.cssText='font-size:10px;flex:1;min-width:0;max-width:140px;padding:1px 2px;border:1px solid #ccc;border-radius:4px;background:#fff;color:#1a1a18';
  buildSceneSelect(sel);
  sel.addEventListener('change',function(){
    if(!this.value)return;
    const sc=scenes.find(s=>s.id===this.value);
    applyScene(this.value);
    if(sc)[...this.options].forEach(o=>{o.selected=(o.value===sc.id);});
    // mettre à jour état bouton i scène
    updateSceneInfoBtn();
  });

  const btnSave=document.createElement('button');btnSave.className='btn-scene-ico';btnSave.title='Sauvegarder ce groove';btnSave.textContent='💾';
  btnSave.addEventListener('click',()=>openSceneModal());

  // bouton i scène
  const btnInfoSc=document.createElement('button');
  btnInfoSc.className='btn-info-ico';btnInfoSc.id='scene-info-btn';
  btnInfoSc.textContent='i';btnInfoSc.title='À propos de cette rythmique';
  btnInfoSc.style.minWidth='20px';btnInfoSc.style.opacity='.3';btnInfoSc.style.cursor='default';btnInfoSc.style.pointerEvents='none';
  btnInfoSc.addEventListener('click',()=>{
    const scId=sel.value;
    const eKey=SCENE_ENCYCLO[scId];
    if(!eKey)return;
    const isOn=btnInfoSc.classList.contains('active');
    // désactiver tous les i couches aussi
    LAYERS.forEach(l=>{const b=document.getElementById('info-ico-'+l.id);if(b)b.classList.remove('active');});
    const content=document.getElementById('encyclo-content');
    // encloBtn remplacé par toggleEncyclo
    if(isOn){
      btnInfoSc.classList.remove('active');
      if(content){toggleEncyclo(false);}
    } else {
      btnInfoSc.classList.add('active');
      const es=document.getElementById('encyclo-select');
      if(es&&[...es.options].some(o=>o.value===eKey)){es.value=eKey;renderEncyclo(eKey);}
      if(content&&content.classList.contains('closed')){toggleEncyclo(true);}
    }
  });

  const btnEditSc=document.createElement('button');
  btnEditSc.className='btn-volet btn-volet-groove open';btnEditSc.id='scene-edit-btn';
  btnEditSc.textContent='Patterns ▼';btnEditSc.title='Afficher/masquer les couches';
  btnEditSc.addEventListener('click',()=>{
    const lw=document.getElementById('layers-wrap');
    const dv=document.getElementById('hdivider-after-layers');
    const hidden=lw.style.display==='none';
    lw.style.display=hidden?'':'none';
    if(dv)dv.style.display=hidden?'':'none';
    btnEditSc.textContent=hidden?'Patterns ▼':'Patterns ▶';
    btnEditSc.classList.toggle('open',hidden);
  });

  btnEditSc.style.marginLeft='auto';
  bar.appendChild(lbl);bar.appendChild(sel);bar.appendChild(btnSave);bar.appendChild(btnInfoSc);bar.appendChild(btnEditSc);
}

// clés encyclo par scène (pour le bouton i scène)
const SCENE_ENCYCLO={salsa32:'son32', bossanova:'bossa', techno:'fl4', reggae:'reggae', dancehall:'tres'};

function updateSceneInfoBtn(){
  const sel=document.getElementById('scene-select');
  const btn=document.getElementById('scene-info-btn');
  if(!sel||!btn)return;
  const hasE=!!(sel.value&&SCENE_ENCYCLO[sel.value]);
  btn.style.opacity=hasE?'1':'.3';
  btn.style.cursor=hasE?'pointer':'default';
}

let sceneModalCb=null;
function openSceneModal(){
  sceneModalCb=null;
  document.getElementById('modal-input').value='';
  document.getElementById('modal-bg').classList.add('open');
  document.getElementById('modal-h3').textContent='Nom de la rythmique';
  sceneModalCb=(name)=>{
    const id='sc_'+Date.now();
    scenes.push({
      id,name,custom:true,
      layers:LAYERS.map((_,li)=>({
        patId:dict[state[li].dictIdx].id,
        shift:state[li].shiftCount||0,
        halfOn:state[li].halfOn,
        doubleOn:state[li].doubleOn,
        muted:state[li].muted,
      }))
    });
    const sel=document.getElementById('scene-select');
    buildSceneSelect(sel);
  };
}

// ─── AUDIO v1.5 ───────────────────────────────────────────────────────────────

// ── Primitives de synthèse ────────────────────────────────────────────────────
function lerp(a,b,t){return a+(b-a)*Math.max(0,Math.min(1,t));}

function sineDrop(a,t,f0,f1,dur,vol,punch){
  const o=a.createOscillator(),g=a.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(f0,t);
  o.frequency.exponentialRampToValueAtTime(Math.max(f1,8),t+dur);
  const pk=punch?vol*1.4:vol;
  g.gain.setValueAtTime(0.001,t);g.gain.linearRampToValueAtTime(pk,t+0.004);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+dur+.02);
}

function noiseClick(a,t,dur,vol){
  const len=Math.ceil(a.sampleRate*Math.max(dur,0.005));
  const buf=a.createBuffer(1,len,a.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,6);
  const src=a.createBufferSource(),g=a.createGain();
  src.buffer=buf;g.gain.value=vol;src.connect(g);g.connect(a.destination);src.start(t);
}

function noiseFiltered(a,t,dur,freq,vol,filterType){
  const len=Math.ceil(a.sampleRate*(dur+.01));
  const buf=a.createBuffer(1,len,a.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=Math.random()*2-1;
  const src=a.createBufferSource();src.buffer=buf;
  const filt=a.createBiquadFilter();filt.type=filterType||'highpass';
  filt.frequency.value=freq;filt.Q.value=0.8;
  const g=a.createGain();
  g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  src.connect(filt);filt.connect(g);g.connect(a.destination);src.start(t);
}

function toneEnv(a,t,freq,dur,vol,type,atk){
  const o=a.createOscillator(),g=a.createGain();
  o.type=type||'sine';o.frequency.value=freq;
  const at=atk||0.003;
  g.gain.setValueAtTime(0.001,t);g.gain.linearRampToValueAtTime(vol,t+at);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+dur+.02);
}

function snareSound(a,t,freq,dur,vol,noiseMix){
  toneEnv(a,t,freq,dur*0.4,vol*(1-noiseMix),'triangle',0.002);
  noiseFiltered(a,t,dur,freq*2,vol*noiseMix,'bandpass');
}

function claveSound(a,t,freq,dur,vol){
  const o=a.createOscillator(),g=a.createGain();
  o.type='square';o.frequency.value=freq;
  const filt=a.createBiquadFilter();filt.type='highpass';filt.frequency.value=freq*0.8;filt.Q.value=2;
  g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(filt);filt.connect(g);g.connect(a.destination);o.start(t);o.stop(t+dur+.01);
}

function rimshotSound(a,t,freq,vol){
  noiseFiltered(a,t,0.04,freq*3,vol*0.7,'highpass');
  noiseClick(a,t,0.006,vol);
}

function bellSound(a,t,freq,dur,vol){
  const ratios=[1,2.756,5.404,8.933,13.35];
  const amps=[1,0.6,0.4,0.25,0.15];
  ratios.forEach((r,i)=>{
    const o=a.createOscillator(),g=a.createGain();
    o.type='sine';o.frequency.value=freq*r;
    const v=vol*amps[i],d=dur*Math.pow(0.55,i);
    g.gain.setValueAtTime(0.001,t);g.gain.linearRampToValueAtTime(v,t+0.005);
    g.gain.exponentialRampToValueAtTime(0.001,t+d);
    o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+d+.02);
  });
}

function triangleSound(a,t,freq,dur,vol){
  const o=a.createOscillator(),g=a.createGain();
  o.type='sine';o.frequency.value=freq;
  const o2=a.createOscillator(),g2=a.createGain();
  o2.type='sine';o2.frequency.value=freq*3.01;g2.gain.value=vol*0.015;
  g.gain.setValueAtTime(0.001,t);g.gain.linearRampToValueAtTime(vol*0.7,t+0.012);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g);o2.connect(g2);g.connect(a.destination);g2.connect(a.destination);
  o.start(t);o2.start(t);o.stop(t+dur+.02);o2.stop(t+dur+.02);
}

function strumSound(a,t,freq,dur,vol){
  [0,0.025,0.05].forEach((delay,i)=>{
    const o=a.createOscillator(),g=a.createGain();
    o.type='sawtooth';o.frequency.value=freq*[1,1.003,0.998][i];
    const filt=a.createBiquadFilter();filt.type='lowpass';
    filt.frequency.setValueAtTime(freq*6,t+delay);
    filt.frequency.exponentialRampToValueAtTime(freq*1.5,t+delay+dur);
    filt.Q.value=1.2;
    g.gain.setValueAtTime(0.001,t+delay);g.gain.linearRampToValueAtTime(vol*0.5,t+delay+0.005);
    g.gain.exponentialRampToValueAtTime(0.001,t+delay+dur);
    o.connect(filt);filt.connect(g);g.connect(a.destination);
    o.start(t+delay);o.stop(t+delay+dur+.02);
  });
}

function congaSound(a,t,f0,dur,vol,isBass){
  const f1=f0*(isBass?0.35:0.45);
  sineDrop(a,t,f0,f1,dur,vol,false);
  if(isBass){
    const o=a.createOscillator(),g=a.createGain();
    o.type='sine';o.frequency.value=f0*0.5;
    g.gain.setValueAtTime(vol*0.3,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur*0.6);
    o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+dur*0.6+.01);
  }
  noiseClick(a,t,0.008,vol*0.5);
}

function bongoSound(a,t,freq,dur,vol){
  sineDrop(a,t,freq*1.4,freq*0.7,dur,vol*0.8,false);
  const o=a.createOscillator(),g=a.createGain();
  o.type='sine';o.frequency.setValueAtTime(freq*2.8,t);
  o.frequency.exponentialRampToValueAtTime(freq*1.4,t+dur*0.5);
  g.gain.setValueAtTime(vol*0.4,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur*0.5);
  o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+dur*0.5+.01);
  noiseClick(a,t,0.006,vol*0.4);
}

// ── Plages de pitch par son (notes tempérées) ─────────────────────────────────
const PITCH_RANGES={
  kick:         [40,  160],
  gros_caisse:  [36,  146],
  tambour:      [41,  165],
  tom_bas:      [55,  220],
  snare:        [138, 554],
  caisse_claire:[131, 523],
  clave:        [880, 3520],
  triangle_inst:[523, 2093],
  hihat_f:      [3000,12000],
  hihat_o:      [2000,8000],
  shaker:       [1500,6000],
  charleston:   [2500,10000],
  conga_b:      [55,  220],
  bongo:        [110, 330],
  bell:         [440, 1760],
  triangle_p:   [880, 3520],
  strum:        [110, 440],
  rimshot:      [200, 800],
  clap:         [300, 1200],
};
function getPitchRange(soundId){return PITCH_RANGES[soundId]||[100,2000];}
function pitchToNorm(hz,soundId){
  const[lo,hi]=getPitchRange(soundId);
  return Math.max(0,Math.min(1,Math.log(Math.max(hz,lo)/lo)/Math.log(hi/lo)));
}
function normToPitch(n,soundId){
  const[lo,hi]=getPitchRange(soundId);
  return lo*Math.pow(hi/lo,Math.max(0,Math.min(1,n)));
}

function defaultSoundState(soundId,pitchDef){

}

// ── Appliquer un style de band ────────────────────────────────────────────────
function applyBandStyle(styleId){
  const s=BAND_STYLES.find(b=>b.id===styleId);if(!s)return;
  soundState[0]={soundId:s.low,   pitch:s.lowPitch,   env:.3,vol:soundState[0].vol};

  soundStateThumb[1]={soundId:s.thumbR,pitch:s.thumbRPitch,env:.3,vol:soundStateThumb[1].vol};
  buildSoundPanel();
}

// ── playSound unifié ──────────────────────────────────────────────────────────
function playSound(ss, atTime){
  const a=getAC();if(!a)return;
  const lat=latencyMs/1000;
  const t=Math.max(a.currentTime,atTime+lat);
  const def=SOUND_DEFS[ss.soundId];if(!def)return;
  def.play(a,t,{pitch:ss.pitch,env:ss.env,vol:ss.vol});
}

// Remplace l'ancien scheduleNote
function scheduleNote(li,atTime){
  playSound(soundState[li],atTime);
}

function playConga(isRight){
  const a=getAC();if(!a)return;
  const t=a.currentTime;
  playSound(soundStateThumb[isRight?1:0],t);
}

const LAYER_LABELS=['Grave','Aigu','Noise'];
const LAYER_CLS=['c-low','c-high','c-noise'];
const THUMB_LABELS=['Main gauche','Main droite'];
const THUMB_CLS=['c-thumb-l','c-thumb-r'];

// état ouvert/fermé mémorisé par couche — clé = 'low'|'high'|'noise'|'tl'|'tr'
const soundPanelOpen={low:false, high:false, noise:false, tl:false, tr:false};

function buildSoundPanel(){
  const cont=document.getElementById('sounds');if(!cont)return;cont.innerHTML='';

  // 3 couches groove
  const grooveKeys=['low','high','noise'];
  soundState.forEach((ss,li)=>{
    cont.appendChild(buildSoundRow(
      LAYER_LABELS[li], LAYER_CLS[li],
      grooveKeys[li], ss, grooveKeys[li]
    ));
  });

  // séparateur
  const sep=document.createElement('div');
  sep.style.cssText='height:1px;background:#d0cec7;margin:6px 0';
  cont.appendChild(sep);

  // 2 mains
  soundStateThumb.forEach((ss,ti)=>{
    const key=ti===0?'tl':'tr';
    cont.appendChild(buildSoundRow(
      THUMB_LABELS[ti], THUMB_CLS[ti],

    ));

function buildSoundRow(label,cls,cat,ss,openKey){
  const row=document.createElement('div');row.className='sound-layer '+cls;

  // ── Header ──────────────────────────────────────────────────────────────────
  const header=document.createElement('div');header.className='sound-layer-header';

  // Gauche : label + select preset + flèche
  const headerL=document.createElement('div');
  headerL.style.cssText='display:flex;align-items:center;gap:5px;flex:1;min-width:0';
  const arrow=document.createElement('span');arrow.className='sound-layer-arrow';arrow.textContent='▶';
  const lbl=document.createElement('div');lbl.className='sound-lbl';lbl.textContent=label;
  const instrSel=document.createElement('select');
  instrSel.style.cssText='font-size:9px;padding:1px 2px;border:1px solid var(--cs);border-radius:3px;background:#fff;color:var(--cb);max-width:90px;flex-shrink:1';
  Object.entries(SOUND_DEFS)
    .filter(([,d])=>cat==='thumb'?d.cat==='thumb':d.cat===cat)
    .forEach(([id,d])=>{
      const o=document.createElement('option');o.value=id;o.textContent=d.label;instrSel.appendChild(o);
    });
  instrSel.value=ss.soundId;
  instrSel.addEventListener('change',e=>{
    e.stopPropagation();
    ss.soundId=instrSel.value;
  });
  instrSel.addEventListener('pointerdown',e=>e.stopPropagation());

  headerL.appendChild(arrow);headerL.appendChild(lbl);headerL.appendChild(instrSel);

  // Droite : slider volume horizontal
  const volHWrap=document.createElement('div');volHWrap.className='vol-h-wrap';
  const volHLbl=document.createElement('span');volHLbl.className='vol-h-lbl';volHLbl.textContent='vol';
  const volHTrack=document.createElement('div');volHTrack.className='vol-h-track';
  const volHFill=document.createElement('div');volHFill.className='vol-h-fill';
  const volHThumb=document.createElement('div');volHThumb.className='vol-h-thumb';
  volHTrack.appendChild(volHFill);volHTrack.appendChild(volHThumb);
  volHWrap.appendChild(volHLbl);volHWrap.appendChild(volHTrack);

  header.appendChild(headerL);header.appendChild(volHWrap);

  // ── Contenu collapsible : Hauteur + Envel. seulement ────────────────────────
  const ctrls=document.createElement('div');ctrls.className='sound-ctrls';
  const ctrlsInner=document.createElement('div');ctrlsInner.className='sound-ctrls-left';
  ctrlsInner.appendChild(mkSlider('Hauteur',v=>{ss.pitch=normToPitch(v,ss.soundId);},pitchToNorm(ss.pitch,ss.soundId)));
  ctrlsInner.appendChild(mkSlider('Envel.',v=>{ss.env=v;},ss.env));
  ctrls.appendChild(ctrlsInner);

  // ── Sync visuel volume ───────────────────────────────────────────────────────
  function updateVolVisual(v){
    const pct=Math.max(0,Math.min(1,v))*100;
    volHFill.style.width=pct+'%';
    volHThumb.style.left=pct+'%';
  }
  updateVolVisual(ss.vol);
  setupHDrag(volHTrack,v=>{ss.vol=v;updateVolVisual(v);});
  volHWrap.addEventListener('pointerdown',e=>e.stopPropagation());

  // ── Toggle volet ─────────────────────────────────────────────────────────────
  const isOpen=soundPanelOpen[openKey]!==false;
  if(!isOpen)ctrls.classList.add('hidden');
  else arrow.classList.add('open');

  header.addEventListener('click',()=>{
    const nowHidden=ctrls.classList.toggle('hidden');
    arrow.classList.toggle('open',!nowHidden);
    soundPanelOpen[openKey]=!nowHidden;
  });

  row.appendChild(header);row.appendChild(ctrls);return row;
}

function setupHDrag(track,onVal){
  function calc(e){const r=track.getBoundingClientRect();return Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));}
  function move(e){onVal(calc(e));}
  track.addEventListener('pointerdown',e=>{
    e.preventDefault();track.setPointerCapture(e.pointerId);
    onVal(calc(e));
    track.addEventListener('pointermove',move);
    track.addEventListener('pointerup',()=>track.removeEventListener('pointermove',move),{once:true});
  });
}

// conversion pitch ↔ normalisé 0-1 (log pour les fréquences)
function mkSlider(lbl,cb,initVal){
  const row=document.createElement('div');row.className='sl-row';
  const lb=document.createElement('label');lb.textContent=lbl;
  const sl=document.createElement('input');sl.type='range';
  sl.min=0;sl.max=1000;sl.step=1;sl.value=Math.round((initVal||0)*1000);
  sl.style.flex='1';sl.style.accentColor='var(--cc,#888)';
  sl.addEventListener('input',()=>cb(parseInt(sl.value)/1000));
  row.appendChild(lb);row.appendChild(sl);return row;
}

const LAYERS=[
  {id:"low",  label:"Grave", defId:"fl4",    cls:"c-low"},
  {id:"high", label:"Aigu",  defId:"tres",   cls:"c-high"},
  {id:"noise",label:"Noise", defId:"pulse4", cls:"c-noise"},
];

let state=LAYERS.map((l,li)=>({
  dictIdx:dict.findIndex(r=>r.id===l.defId),
  pattern:dict.find(r=>r.id===l.defId).pattern.split(''),
  shift:0, dirty:false, handEdited:false,
  halfOn:false, doubleOn:false,
  pendingHalf:false, pendingDouble:false, pendingClear:false,
  nextStepTime:0, startTime:0, muted:li>1,
  stepPos:0, wrapped:false
}));

let playing=false,ac=null,savingLi=null,latencyMs=0;
let globalSpeedMult=1;
let pendingGlobalMult=1;
let schedTimerID=null,visualRafID=null;
const STEP_W=22;
const LOOKAHEAD=0.1;
const SCHED_MS=25;

function getAC(){
  if(!ac){ac=new(window.AudioContext||window.webkitAudioContext)();}
  return ac;
}

function getBeatSec(li){
  const spm=parseInt(document.getElementById('bpm').value)*globalSpeedMult;
  const mult=state[li].doubleOn?2:state[li].halfOn?0.5:1;
  return(60/spm)/mult;
}


function scheduler(){
  if(!playing)return;
  const now=getAC().currentTime;
  LAYERS.forEach((layer,li)=>{
    while(state[li].nextStepTime < now+LOOKAHEAD){
      const si=state[li].stepPos;
      // apply pending speed at pattern boundary
      if(si===0){
        // apply global mult at boundary of layer 0
        if(li===0&&pendingGlobalMult!==globalSpeedMult){
          const a2=getAC(),now2=a2.currentTime,oldM=globalSpeedMult;
          globalSpeedMult=pendingGlobalMult;
          // option C recalibrate all layers
          LAYERS.forEach((_,lj)=>{
            const rem=state[lj].nextStepTime-now2;
            if(rem>0) state[lj].nextStepTime=now2+rem*(oldM/globalSpeedMult);
          });
          document.getElementById('btn-global-half').classList.toggle('active',globalSpeedMult===0.5);
          document.getElementById('btn-global-double').classList.toggle('active',globalSpeedMult===2);
        }
        if(state[li].pendingClear){state[li].halfOn=false;state[li].doubleOn=false;state[li].pendingClear=false;}
        if(state[li].pendingHalf){state[li].halfOn=true;state[li].doubleOn=false;state[li].pendingHalf=false;}
        if(state[li].pendingDouble){state[li].doubleOn=true;state[li].halfOn=false;state[li].pendingDouble=false;}
        const liCopy=li;
        requestAnimationFrame(()=>{
          const bh=document.getElementById('half-'+LAYERS[liCopy].id);
          const bd=document.getElementById('dbl-'+LAYERS[liCopy].id);
          if(bh)bh.classList.toggle('on',state[liCopy].halfOn);
          if(bd)bd.classList.toggle('on',state[liCopy].doubleOn);
        });
      }
      if(state[li].pattern[si]==='X'&&!state[li].muted) scheduleNote(li,state[li].nextStepTime);
      state[li].nextStepTime+=getBeatSec(li);
      state[li].stepPos=(si+1)%state[li].pattern.length;
    }
  });
  schedTimerID=setTimeout(scheduler,SCHED_MS);
}

function visualLoop(){
  if(!playing)return;
  // dispatch to circle version if active (defined later)
  if(typeof circleView!=='undefined'&&circleView){visualLoopCircle&&visualLoopCircle();return;}
  const now=getAC().currentTime;
  LAYERS.forEach((layer,li)=>{
    const beatSec=getBeatSec(li);
    const elapsed=now-state[li].startTime;
    const si=Math.floor(elapsed/beatSec)%state[li].pattern.length;
    const div=document.getElementById('steps-'+layer.id);if(!div)return;
    div.querySelectorAll('.step').forEach((s,i)=>s.classList.toggle('cur',i===si));
  });
  visualRafID=requestAnimationFrame(visualLoop);
}
let visualLoopCircle=null;

function rotate(arr,n){const l=arr.length;if(!l)return arr;const k=((n%l)+l)%l;return[...arr.slice(k),...arr.slice(0,k)];}
function halfAt(len){if(len<=4)return null;return Math.ceil(len/2);}

// ─── DIRTY STATE ──────────────────────────────────────────────────────────────
function setDirty(li,handEdit){
  state[li].dirty=true;
  if(handEdit)state[li].handEdited=true;
  updateDirtyUI(li);
  markSceneModified();
}
function clearDirty(li){
  state[li].dirty=false;state[li].handEdited=false;
  updateDirtyUI(li);
}
function updateDirtyUI(li){
  const saveIco=document.getElementById('save-ico-'+LAYERS[li].id);
  const tag=document.getElementById('modified-tag-'+LAYERS[li].id);
  const sel=document.getElementById('sel-'+LAYERS[li].id);
  if(!saveIco)return;
  if(state[li].dirty){
    saveIco.classList.add('dirty');
    // add * to selected option text
    const opt=sel.options[sel.selectedIndex];
    if(opt&&!opt.text.endsWith(' *'))opt.text=opt.text+' *';
  } else {
    saveIco.classList.remove('dirty');
    // remove * from all options
    [...sel.options].forEach(o=>{if(o.text.endsWith(' *'))o.text=o.text.slice(0,-2);});
  }
  if(tag)tag.classList.toggle('show',state[li].handEdited);
}
// ─── STEPS DOM ────────────────────────────────────────────────────────────────
function buildStepsDOM(li,wrap){
  const container=document.getElementById('steps-'+LAYERS[li].id);
  if(!container)return;
  container.innerHTML='';
  const pat=state[li].pattern;
  const ha=wrap?halfAt(pat.length):null;
  pat.forEach((p,si)=>{
    if(ha&&si===ha){
      const br=document.createElement('div');br.style.cssText='width:100%;height:0;flex-basis:100%;flex-shrink:0';container.appendChild(br);
    }
    const s=document.createElement('div');
    s.className='step '+(p==='X'?'on':'off');
    s.addEventListener('click',()=>{
      state[li].pattern[si]=state[li].pattern[si]==='X'?'.':'X';
      s.className='step '+(state[li].pattern[si]==='X'?'on':'off')+(state[li].stepPos===si?' cur':'');
      setDirty(li,true);
      if(typeof circleView!=='undefined'&&circleView) drawCircles();
    });
    container.appendChild(s);
  });
  state[li].wrapped=wrap;
  // if circle view active, redraw
  if(typeof circleView!=='undefined'&&circleView) drawCircles();
}

function checkWrap(li){
  const wrap=document.getElementById('steps-'+LAYERS[li].id);if(!wrap)return;
  const avail=wrap.parentElement.clientWidth-60;
  const needed=state[li].pattern.length*STEP_W;
  const shouldWrap=needed>avail;
  if(shouldWrap!==state[li].wrapped)buildStepsDOM(li,shouldWrap);
}

const observers=[];
function attachObserver(li){
  const wrap=document.getElementById('steps-'+LAYERS[li].id);if(!wrap)return;
  const obs=new ResizeObserver(()=>checkWrap(li));
  obs.observe(wrap.parentElement);observers.push(obs);
}

function rebuildSelect(li){
  const sel=document.getElementById('sel-'+LAYERS[li].id);if(!sel)return;
  const curId=dict[state[li].dictIdx]?.id;
  buildRhythmSelect(sel,true);
  [...sel.options].forEach(o=>{if(o.value===curId)o.selected=true;});
}

function updateCtrlBtns(li){
  const r=dict[state[li].dictIdx];
  const trash=document.getElementById('trash-'+LAYERS[li].id);
  const conf=document.getElementById('conf-'+LAYERS[li].id);
  if(trash)trash.style.display=r&&r.custom?'inline-flex':'none';
  if(conf)conf.style.display='none';
  state[li].confirming=false;
}

// ─── ENCYCLOPÉDIE ─────────────────────────────────────────────────────────────
function buildRhythmSelect(selEl,includeCustom){
  selEl.innerHTML='';
  GROUPS.forEach((g,gi)=>{
    if(gi>0){
      // separator line — disabled option with no text
      const sep=document.createElement('option');
      sep.disabled=true;sep.textContent='─ ─ ─ ─ ─';
      sep.style.color='#ccc';selEl.appendChild(sep);
    }
    g.ids.forEach(id=>{
      const r=dict.find(d=>d.id===id);if(!r)return;
      const o=document.createElement('option');o.value=r.id;
      o.textContent=r.name+' ('+r.length+')';
      selEl.appendChild(o);
    });
  });
  if(includeCustom){
    const customs=dict.filter(r=>r.custom);
    if(customs.length){
      const sep=document.createElement('option');sep.disabled=true;sep.textContent='─ ─ ─ ─ ─';sep.style.color='#ccc';selEl.appendChild(sep);
      customs.forEach(r=>{const o=document.createElement('option');o.value=r.id;o.textContent=r.name+' ('+r.length+')';selEl.appendChild(o);});
    }
  }
}

function buildEncycloSelect(){
  const sel=document.getElementById('encyclo-select');if(!sel)return;
  const curVal=sel.value;sel.innerHTML='';
  // entrée PoumTchak en tête
  const oIntro=document.createElement('option');oIntro.value='_poumtchak';oIntro.textContent='PoumTchak';
  sel.appendChild(oIntro);
  const sep0=document.createElement('option');sep0.disabled=true;sep0.textContent='─ ─ ─ ─ ─';sep0.style.color='#ccc';sel.appendChild(sep0);
  let first=true;
  GROUPS.forEach(g=>{
    const items=g.ids.filter(id=>{const r=dict.find(d=>d.id===id);return r&&r.encyclo;});
    if(!items.length)return;
    if(!first){const sep=document.createElement('option');sep.disabled=true;sep.textContent='─ ─ ─ ─ ─';sep.style.color='#ccc';sel.appendChild(sep);}
    first=false;
    items.forEach(id=>{
      const r=dict.find(d=>d.id===id);
      const o=document.createElement('option');o.value=r.encyclo;o.textContent=r.name;
      sel.appendChild(o);
    });
